// ─────────────────────────────────────────────
// MODEL FUNCTIONS
// ─────────────────────────────────────────────

function calcFXRate(state, year) {
  const yearsOut = year - 2025;
  return state.arFX * Math.pow(1 + state.arFXDevaluation, yearsOut);
}

// Core: TAM(año) × penetration% → units
// TAM crece al CAGR del mercado cada año
function calcMarketVolume(mkt, yearIdx, mult) {
  const idx = Math.min(yearIdx, (mkt.penetration || []).length - 1);
  const basePct = (mkt.penetration[idx] || 0) / 100;
  const cagr = mkt.marketCAGR || 0;
  const growingTAM = mkt.tamUnits * Math.pow(1 + cagr, yearIdx);
  return growingTAM * Math.min(basePct * mult, 0.99);
}

function calcVolume(state, year) {
  const mult = state.scenarioMultipliers[state.scenario];
  const yearIdx = year - 2025;
  let vol = 0;
  for (const mkt of Object.values(state.markets)) {
    if (mkt.active && year >= mkt.openYear) vol += calcMarketVolume(mkt, yearIdx, mult);
  }
  return vol;
}

function calcRevenue(state, year) {
  const mult = state.scenarioMultipliers[state.scenario];
  const yearIdx = year - 2025;
  let rev = 0;
  for (const mkt of Object.values(state.markets)) {
    if (mkt.active && year >= mkt.openYear) {
      rev += (calcMarketVolume(mkt, yearIdx, mult) / 1000) * (mkt.priceUSD || state.cogsPerUnit);
    }
  }
  return rev; // $K USD
}

function calcCOGS(state, year) {
  const mult = state.scenarioMultipliers[state.scenario];
  const yearIdx = year - 2025;
  let cogs = 0;
  for (const mkt of Object.values(state.markets)) {
    if (mkt.active && year >= mkt.openYear) {
      cogs += (calcMarketVolume(mkt, yearIdx, mult) / 1000) * (mkt.cogsUSD || state.cogsPerUnit);
    }
  }
  return cogs; // $K USD
}

function calcGrossProfit(state, year) {
  return calcRevenue(state, year) - calcCOGS(state, year);
}

function calcOpExPct(state) {
  return (state.expenseLines || []).reduce((s, l) => s + (l.pct || 0), 0);
}
function calcSGA(state, year) {
  return calcRevenue(state, year) * calcOpExPct(state);
}
function calcOpExLines(state, year) {
  const rev = calcRevenue(state, year);
  return (state.expenseLines || []).map(l => ({ ...l, amount: rev * (l.pct || 0) }));
}

function calcEBITDA(state, year) {
  return calcGrossProfit(state, year) - calcSGA(state, year);
}

function calcDepreciation(state, year) {
  // From Excel: capex depreciates over 20 years, half in first year
  const capexSchedule = { 2026: state.capex[0], 2027: state.capex[1], 2028: state.capex[2], 2029: state.capex[3], 2030: state.capex[4] };
  let dep = 0;
  for (let capexYear = 2026; capexYear <= year; capexYear++) {
    const capexAmt = capexSchedule[capexYear] || 0;
    const annualDep = capexAmt / 20;
    const yearsActive = year - capexYear;
    if (yearsActive === 0) dep += annualDep * 0.5;
    else dep += annualDep;
  }
  return dep;
}

function calcEBIT(state, year) {
  return calcEBITDA(state, year) - calcDepreciation(state, year);
}

function calcWorkingCapital(state, year) {
  const rev = calcRevenue(state, year);
  const cogs = calcCOGS(state, year);
  const ar = (rev / 365) * state.daysAR;
  const inv = (cogs / 365) * state.daysInventory;
  const ap = (cogs / 365) * state.daysAP;
  return ar + inv - ap;
}

function calcDeltaWC(state, year) {
  if (year <= 2025) return 0;
  return calcWorkingCapital(state, year) - calcWorkingCapital(state, year - 1);
}

function calcTax(state, year) {
  const ebit = calcEBIT(state, year);
  if (ebit <= 0) return 0;
  return ebit * state.taxRate;
}

function calcNOPAT(state, year) {
  return calcEBIT(state, year) - calcTax(state, year);
}

function calcFCF(state, year) {
  if (year <= 2025) return null;
  const ebitda = calcEBITDA(state, year);
  const tax = calcTax(state, year);
  const capex = state.capex[year - 2026] || 0;
  const deltaWC = calcDeltaWC(state, year);
  return ebitda - tax - capex - deltaWC;
}

function calcDebtService(state, year) {
  if (state.financingMode === 'equity') return 0;
  if (state.debtAmount <= 0) return 0;
  const startYear = 2026;
  const endYear = startYear + state.debtTermYears - 1;
  if (year < startYear || year > endYear) return 0;
  const annualPrincipal = state.debtAmount / state.debtTermYears;
  const remainingDebt = state.debtAmount - (year - startYear) * annualPrincipal;
  const interest = remainingDebt * state.debtInterestRate;
  return annualPrincipal + interest;
}

function calcDCF(state) {
  const wacc = state.wacc;
  const tg = state.terminalGrowthRate;
  let pvSum = 0;
  let pvFCFs = {};

  for (let year = 2026; year <= 2030; year++) {
    const fcf = calcFCF(state, year);
    const t = year - 2025; // years from end of 2025
    const pv = fcf / Math.pow(1 + wacc, t);
    pvSum += pv;
    pvFCFs[year] = pv;
  }

  // Terminal value (perpetuity method)
  const termFCF = calcFCF(state, 2030);
  const terminalValue = (termFCF * (1 + tg)) / (wacc - tg);
  const pvTerminal = terminalValue / Math.pow(1 + wacc, 5);

  // Multiple method terminal value
  const termEBITDA = calcEBITDA(state, 2030);
  const tvMultiple = termEBITDA * state.terminalEBITDAMultiple;
  const pvTerminalMultiple = tvMultiple / Math.pow(1 + wacc, 5);

  const evPerpetual = pvSum + pvTerminal;
  const evMultiple = pvSum + pvTerminalMultiple;

  return {
    pvFCFs,
    pvSum,
    pvTerminal,
    pvTerminalMultiple,
    terminalValue,
    tvMultiple,
    evPerpetual,
    evMultiple,
    equityValuePerpetual: evPerpetual,
    equityValueMultiple: evMultiple,
  };
}

function calcChannelMargins(state) {
  const results = {};
  for (const [key, ch] of Object.entries(state.channels)) {
    const netRev = ch.priceUSD * (1 - ch.distribFee);
    const grossMargin = (netRev - ch.cogsUSD) / netRev;
    const contribPerUnit = netRev - ch.cogsUSD;
    const contribPerSGA = contribPerUnit / (ch.priceUSD * state.sgaPercent);
    results[key] = {
      ...ch,
      netRevPerUnit: netRev,
      grossMarginPct: grossMargin,
      contribPerUnit,
      contribPerSGA,
    };
  }
  return results;
}

function calcBlendedMargin(channels) {
  let totalShare = 0, weightedMargin = 0;
  for (const ch of Object.values(channels)) {
    totalShare += ch.share;
    weightedMargin += ch.share * ch.grossMarginPct;
  }
  return totalShare > 0 ? weightedMargin / totalShare : 0;
}

function calcFXImpact(state, year) {
  const fxRate = calcFXRate(state, year);
  const rev = calcRevenue(state, year);
  return { fxRate, revUSD: rev, revARS: rev * fxRate };
}

function calcEquityValue(state) {
  return calcDCF(state).evPerpetual;
}

function buildFinancials(state) {
  const rows = {};
  for (const year of YEARS) {
    rows[year] = {
      revenue: calcRevenue(state, year),
      cogs: calcCOGS(state, year),
      grossProfit: calcGrossProfit(state, year),
      sga: calcSGA(state, year),
      ebitda: calcEBITDA(state, year),
      depreciation: year > 2025 ? calcDepreciation(state, year) : 0,
      ebit: year > 2025 ? calcEBIT(state, year) : calcEBITDA(state, year),
      tax: calcTax(state, year),
      nopat: calcNOPAT(state, year),
      workingCapital: calcWorkingCapital(state, year),
      deltaWC: calcDeltaWC(state, year),
      capex: year > 2025 ? (state.capex[year - 2026] || 0) : 0,
      fcf: calcFCF(state, year),
      debtService: calcDebtService(state, year),
    };
  }

  // ── Override 2025 with audited actuals (EECC legalizados) ────────────────
  rows[2025] = {
    ...rows[2025],
    revenue:        ACTUALS_2025.revenue,
    cogs:           ACTUALS_2025.cogs,
    grossProfit:    ACTUALS_2025.grossProfit,
    sga:            ACTUALS_2025.sga,
    ebitda:         ACTUALS_2025.ebitda,
    depreciation:   0,
    ebit:           ACTUALS_2025.ebit,
    tax:            0,
    nopat:          ACTUALS_2025.nopat,
    workingCapital: ACTUALS_2025.workingCapital,
    deltaWC:        0,
    capex:          0,
    fcf:            null,
    debtService:    0,
    isActual:       true,
  };

  // ── Fix 2026 ΔWC: base must be actual 2025 WC, not model 2025 WC ────────
  if (rows[2026]) {
    const dWC2026 = rows[2026].workingCapital - ACTUALS_2025.workingCapital;
    rows[2026] = {
      ...rows[2026],
      deltaWC: dWC2026,
      fcf: rows[2026].ebitda - rows[2026].tax - rows[2026].capex - dWC2026,
    };
  }

  return rows;
}

// ─────────────────────────────────────────────
// FORMAT HELPERS
// ─────────────────────────────────────────────
function fmt(val, decimals = 0) {
  if (val === null || val === undefined) return '—';
  const abs = Math.abs(val);
  if (abs >= 1000000) return `${val < 0 ? '-' : ''}$${(abs / 1000000).toFixed(1)}M`;
  if (abs >= 1000) return `${val < 0 ? '-' : ''}$${(abs / 1000).toFixed(decimals)}K`;
  return `${val < 0 ? '-' : ''}$${abs.toFixed(decimals)}`;
}
function fmtK(val) {
  if (val === null || val === undefined) return '—';
  if (val < 0) return `(${Math.abs(val).toLocaleString('en', {maximumFractionDigits: 0})})`;
  return val.toLocaleString('en', {maximumFractionDigits: 0});
}
function fmtPct(val, d = 1) {
  if (val === null || val === undefined) return '—';
  return `${(val * 100).toFixed(d)}%`;
}
function fmtM(val) {
  if (val === null || val === undefined) return '—';
  const abs = Math.abs(val) / 1000;
  if (val < 0) return `($${abs.toFixed(0)}K)`;
  return `$${abs.toFixed(0)}K`;
}
function colorVal(val) {
  if (val === null || val === undefined) return '';
  return val >= 0 ? 'text-emerald-700' : 'text-red-600';
}

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  // Smart formatter: detect value type by series name
  const fmtTooltipVal = (name, v) => {
    if (typeof v !== 'number') return v;
    // Percentages (e.g. "EBITDA %", "Gross Margin %", "Margen blended")
    if (/[%]$|Margin %|EBITDA %|margin|Margen/i.test(name)) return `${v.toFixed(1)}%`;
    // Per-unit dollar amounts (e.g. "Contrib/Unit ($)", price fields < 20)
    if (/\/Unit|\(\$\)|per unit/i.test(name) || (Math.abs(v) < 20 && Math.abs(v) > 0 && !Number.isInteger(v))) return `$${v.toFixed(2)}`;
    // Default: treat as $K → format as M/K
    return v < 0 ? `(${fmt(Math.abs(v) * 1000)})` : fmt(v * 1000);
  };
  return (
    <div style={{ background: '#FFFFFF', border: '1px solid #E6E6E6', borderLeft: '3px solid #F7AF1C', padding: '8px 14px', fontFamily: 'Inter, Helvetica Neue, sans-serif', boxShadow: '0 4px 16px rgba(29,29,27,0.12)' }}>
      <p style={{ color: '#1D1D1B', fontWeight: 700, fontSize: 13, marginBottom: 5, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</p>
      {payload.map((p, i) => (
        <p key={i} style={{ color: p.color || '#1D1D1B', fontSize: 13, margin: '2px 0' }}>
          <span style={{ color: 'rgba(29,29,27,0.5)', marginRight: 4 }}>{p.name}:</span>
          <strong>{fmtTooltipVal(p.name, p.value)}</strong>
        </p>
      ))}
    </div>
  );
};

// SLIDER COMPONENT

function Slider({ label, value, min, max, step, onChange, format }) {
  return (
    <div className="mb-3">
      <div className="flex justify-between mb-1">
        <span className="text-xs font-condensed text-ink-60 uppercase tracking-wider">{label}</span>
        <span className="text-sm font-condensed font-bold text-gold">{format ? format(value) : value}</span>
      </div>
      <input
        type="range" min={min} max={max} step={step}
        value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        className="w-full"
      />
    </div>
  );
}

function Module1({ state, setState }) {
  const mult = state.scenarioMultipliers[state.scenario];
  const [selectedCode, setSelectedCode] = React.useState('');

  const addMarket = () => {
    if (!selectedCode || state.markets[selectedCode]) return;
    const c = COUNTRY_MAP[selectedCode];
    if (!c) return;
    setState(s => ({
      ...s,
      markets: {
        ...s.markets,
        [c.code]: {
          active: true, openYear: 2026, code: c.code, country: c.name, flag: c.flag, color: c.color,
          tamUSD: c.tamM,
          canFormat: '355ml',
          tamAvgPrice: c.price,
          tamUnits: c.tamM * 1e6 / c.price,
          marketCAGR: c.cagr || 0.08,
          penetration: [0, 0.10, 0.50, 1.50, 3.00, 6.00],
          priceUSD: c.price, cogsUSD: c.cogs,
          fxRate: (CURRENCY_INFO[c.code] || {}).defaultFX ?? 1,
          fxDevaluation: (CURRENCY_INFO[c.code] || {}).defaultDeval ?? 0,
          inputCurrency: 'USD',
        }
      }
    }));
    setSelectedCode('');
  };

  const removeMarket = (code) => {
    if (Object.keys(state.markets).length <= 1) return;
    setState(s => {
      const updated = { ...s.markets };
      delete updated[code];
      return { ...s, markets: updated };
    });
  };

  const setMkt = (key, field, val) => setState(s => ({
    ...s, markets: { ...s.markets, [key]: { ...s.markets[key], [field]: val } }
  }));
  const setPenet = (key, idx, val) => setState(s => {
    const arr = [...(s.markets[key].penetration || [])];
    arr[idx] = val;
    return { ...s, markets: { ...s.markets, [key]: { ...s.markets[key], penetration: arr } } };
  });

  // Revenue by market per year for chart
  const marketData = YEARS.map(y => {
    const yearIdx = y - 2025;
    const row = { year: y };
    for (const [key, mkt] of Object.entries(state.markets)) {
      if (mkt.active && y >= mkt.openYear) {
        const vol = calcMarketVolume(mkt, yearIdx, mult);
        row[mkt.country] = Math.round((vol / 1000) * mkt.priceUSD);
      } else {
        row[mkt.country] = 0;
      }
    }
    return row;
  });

  // Volume by market per year
  const volumeData = YEARS.map(y => {
    const yearIdx = y - 2025;
    const row = { year: y };
    for (const [key, mkt] of Object.entries(state.markets)) {
      row[mkt.country] = mkt.active && y >= mkt.openYear
        ? Math.round(calcMarketVolume(mkt, yearIdx, mult) / 1000000 * 10) / 10
        : 0;
    }
    return row;
  });

  return (
    <div className="p-4 space-y-6">

      {/* Product selector */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Tipo de producto</p>
        <div className="flex gap-2 flex-wrap">
          {PRODUCT_TYPES.map(pt => (
            <button key={pt.id}
              onClick={() => setState(s => ({ ...s, productType: pt.id }))}
              className={`px-3 py-1.5 text-xs font-condensed font-bold tracking-wide ${state.productType === pt.id ? 'bg-gold text-black' : 'bg-ink-5 text-ink-60 hover:text-ink'}`}>
              {pt.emoji} {pt.label}
            </button>
          ))}
          <input
            type="text"
            value={state.productName}
            onChange={e => setState(s => ({ ...s, productName: e.target.value }))}
            placeholder="Nombre del producto"
            className="bg-ink-5 text-ink px-2 py-1 text-xs font-condensed ml-2 w-36"
          />
        </div>
      </div>

      {/* Country selector */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Mercados activos — agregá países</p>
        <div className="flex gap-2 items-center flex-wrap">
          <select
            value={selectedCode}
            onChange={e => setSelectedCode(e.target.value)}
            className="bg-white border border-ash text-ink text-sm font-condensed px-3 py-2 min-w-48"
          >
            <option value="">— Seleccioná un país —</option>
            {COUNTRIES.filter(c => !state.markets[c.code]).map(c => (
              <option key={c.code} value={c.code}>{c.flag} {c.name}</option>
            ))}
          </select>
          <button
            onClick={addMarket}
            disabled={!selectedCode}
            className={`px-4 py-2 text-xs font-condensed font-bold tracking-wider ${selectedCode ? 'bg-gold text-black' : 'bg-ink-5 text-ink-20 cursor-not-allowed'}`}>
            + Agregar mercado
          </button>
          <span className="text-xs text-ink-20 font-condensed ml-2">
            {Object.keys(state.markets).length} mercado{Object.keys(state.markets).length !== 1 ? 's' : ''} activo{Object.keys(state.markets).length !== 1 ? 's' : ''}
          </span>
        </div>
      </div>

      {/* Market cards with TAM + penetration + price/cogs */}
      <div className="space-y-4">
        {Object.entries(state.markets).map(([key, mkt]) => {
          const color = mkt.color || GOLD;
          const yearIdx2030 = 5;
          const vol2030 = calcMarketVolume(mkt, yearIdx2030, mult);
          const rev2030 = (vol2030 / 1000) * mkt.priceUSD;
          return (
            <div key={key} className="border bg-ink-5" style={{ borderColor: mkt.active ? color + '66' : 'rgba(255,255,255,0.1)' }}>
              {/* Market header */}
              <div className="flex items-center justify-between px-4 py-3 border-b border-ash">
                <div className="flex items-center gap-3">
                  <span className="text-2xl">{mkt.flag}</span>
                  <div>
                    <span className="font-condensed font-bold text-base" style={{ color }}>{mkt.country}</span>
                    {mkt.active && (
                      <span className="text-xs font-condensed text-ink-60 ml-3">
                        Rev 2030: <span className="font-bold" style={{ color }}>{fmt(rev2030 * 1000)}</span>
                      </span>
                    )}
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs font-condensed text-ink-60">Apertura:</span>
                  <input type="number" value={mkt.openYear} min={2025} max={2032}
                    onChange={e => setMkt(key, 'openYear', parseInt(e.target.value))}
                    className="bg-ink-5 text-ink text-center w-14 px-1 text-xs font-condensed" />
                  <button
                    onClick={() => setMkt(key, 'active', !mkt.active)}
                    className={`px-3 py-1 text-xs font-condensed font-bold ${mkt.active ? 'text-black' : 'bg-ink-5 text-ink-60'}`}
                    style={mkt.active ? { background: color } : {}}>
                    {mkt.active ? 'ON' : 'OFF'}
                  </button>
                  {Object.keys(state.markets).length > 1 && (
                    <button
                      onClick={() => removeMarket(key)}
                      className="px-2 py-1 text-xs font-condensed text-ink-20 hover:text-red-600 border border-ash hover:border-red-400">
                      ×
                    </button>
                  )}
                </div>
              </div>

              {mkt.active && (
                <div className="p-4 space-y-4">
                  {/* ── MARKET SIZING ── */}
                  <div className="border border-ash p-3 space-y-3">
                    <p className="text-xs font-condensed uppercase tracking-wider" style={{ color }}>Tamaño de mercado</p>

                    {/* Row 1: TAM $ + formato de lata */}
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">Valor total del mercado (USD)</p>
                        <div className="flex items-center gap-2">
                          <span className="text-ink-60 font-condensed text-sm">$</span>
                          <input type="number"
                            value={mkt.tamUSD ?? Math.round(mkt.tamUnits * (mkt.tamAvgPrice || 1.00) / 1e6)}
                            min={1} max={500000} step={1}
                            onChange={e => {
                              const usd = parseFloat(e.target.value) || 0;
                              const avgP = mkt.tamAvgPrice || 1.00;
                              setMkt(key, 'tamUSD', usd);
                              setMkt(key, 'tamUnits', usd * 1e6 / avgP);
                            }}
                            className="bg-white border border-ash text-gold text-right px-2 py-1 font-condensed font-bold text-xl w-32" />
                          <span className="text-xs text-ink-60 font-condensed">M USD/año</span>
                        </div>
                      </div>

                      <div>
                        <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">Formato de lata</p>
                        <div className="flex gap-2 flex-wrap">
                          {CAN_FORMATS.map(cf => (
                            <button key={cf.id}
                              onClick={() => {
                                const avgP = mkt.tamAvgPrice || cf.priceDefault || 1.00;
                                const tamUSD = mkt.tamUSD ?? Math.round(mkt.tamUnits * avgP / 1e6);
                                setState(s => ({
                                  ...s, markets: { ...s.markets, [key]: {
                                    ...s.markets[key],
                                    canFormat: cf.id,
                                    cogsUSD: cf.cogsDefault ?? s.markets[key].cogsUSD,
                                    priceUSD: cf.priceDefault ?? s.markets[key].priceUSD,
                                    tamUnits: tamUSD * 1e6 / avgP,
                                  }}
                                }));
                              }}
                              className={`px-3 py-1 text-xs font-condensed font-bold ${(mkt.canFormat || '355ml') === cf.id ? 'text-black' : 'bg-ink-5 text-ink-60'}`}
                              style={(mkt.canFormat || '355ml') === cf.id ? { background: color } : {}}>
                              {cf.label}
                            </button>
                          ))}
                        </div>
                        {CAN_MAP[mkt.canFormat || '355ml'] && (
                          <p className="text-xs text-ink-20 font-condensed mt-1">{CAN_MAP[mkt.canFormat || '355ml'].note}</p>
                        )}
                      </div>
                    </div>

                    {/* Row 2: precio promedio + CAGR + TAM derivado */}
                    <div className="grid grid-cols-3 gap-4 pt-2 border-t border-ash">
                      <div>
                        <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">
                          Precio promedio mercado (USD/lata)
                          <span className="text-ink-20 normal-case ml-1">para $ → unidades</span>
                        </p>
                        <div className="flex items-center gap-2">
                          <span className="text-ink-60 font-condensed text-sm">$</span>
                          <input type="number"
                            value={mkt.tamAvgPrice ?? 1.00}
                            min={0.10} max={20} step={0.01}
                            onChange={e => {
                              const avgP = parseFloat(e.target.value) || 1.00;
                              const tamUSD = mkt.tamUSD ?? Math.round(mkt.tamUnits * avgP / 1e6);
                              setMkt(key, 'tamAvgPrice', avgP);
                              setMkt(key, 'tamUnits', tamUSD * 1e6 / avgP);
                            }}
                            className="bg-white border border-ash text-ink text-right px-2 py-1 font-condensed font-bold text-base w-24" />
                        </div>
                        <p className="text-xs text-ink-20 font-condensed mt-1">≠ tu precio de venta</p>
                      </div>

                      <div>
                        <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">
                          CAGR del mercado
                          <span className="text-ink-20 normal-case ml-1">crecimiento anual</span>
                        </p>
                        <div className="flex items-center gap-2">
                          <input type="number"
                            value={((mkt.marketCAGR || 0) * 100).toFixed(1)}
                            min={0} max={50} step={0.5}
                            onChange={e => setMkt(key, 'marketCAGR', (parseFloat(e.target.value) || 0) / 100)}
                            className="bg-white border border-ash text-right px-2 py-1 font-condensed font-bold text-xl w-20"
                            style={{ color }} />
                          <span className="text-sm font-condensed text-ink-60">%</span>
                        </div>
                        <p className="text-xs text-ink-20 font-condensed mt-1">
                          TAM 2030: {(() => {
                            const tam30 = mkt.tamUnits * Math.pow(1 + (mkt.marketCAGR||0), 5);
                            return tam30 >= 1e9 ? `${(tam30/1e9).toFixed(1)}B` : `${(tam30/1e6).toFixed(0)}M`;
                          })()} latas
                        </p>
                      </div>

                      <div className="flex items-start pt-1">
                        <div>
                          <p className="text-xs font-condensed text-ink-20 uppercase tracking-wider mb-1">TAM base (2025)</p>
                          <p className="font-condensed font-black text-2xl" style={{ color }}>
                            {mkt.tamUnits >= 1e9
                              ? `${(mkt.tamUnits / 1e9).toFixed(2)}B`
                              : `${(mkt.tamUnits / 1e6).toFixed(0)}M`}
                            <span className="text-sm font-normal text-ink-40 ml-1">latas</span>
                          </p>
                          <p className="text-xs text-ink-20 font-condensed">
                            ${(mkt.tamUSD ?? Math.round(mkt.tamUnits * (mkt.tamAvgPrice||1) / 1e6)).toLocaleString()}M ÷ ${(mkt.tamAvgPrice||1.00).toFixed(2)}/lata
                          </p>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* ── FX / TIPO DE CAMBIO ── */}
                  {(() => {
                    const ci = CURRENCY_INFO[mkt.code] || {};
                    if (ci.symbol === 'USD') return null;
                    const fx5 = (mkt.fxRate || 1) * Math.pow(1 + (mkt.fxDevaluation || 0), 5);
                    return (
                      <div className="border border-ash p-3 space-y-3 bg-ink-5">
                        <div className="flex items-center justify-between">
                          <p className="text-xs font-condensed uppercase tracking-wider font-bold" style={{ color }}>
                            Tipo de cambio — {ci.name}
                          </p>
                          <div className="flex gap-1">
                            {['USD', 'local'].map(mode => (
                              <button key={mode}
                                onClick={() => setMkt(key, 'inputCurrency', mode)}
                                className={`px-3 py-1 text-xs font-condensed font-bold ${(mkt.inputCurrency || 'USD') === mode ? 'text-black' : 'border border-ink-20 text-ink-60'}`}
                                style={(mkt.inputCurrency || 'USD') === mode ? { background: color } : {}}>
                                {mode === 'USD' ? '$ USD' : ci.symbol}
                              </button>
                            ))}
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">Tipo de cambio hoy</p>
                            <div className="flex items-center gap-1.5">
                              <span className="text-xs text-ink-40 font-condensed">$1 USD =</span>
                              <input type="number" value={mkt.fxRate || 1} min={0.01} step={ci.symbol === 'CLP' || ci.symbol === 'PYG' || ci.symbol === 'COP' ? 10 : 0.01}
                                onChange={e => setMkt(key, 'fxRate', parseFloat(e.target.value) || 1)}
                                className="bg-white border border-ash text-right px-2 py-1 font-condensed font-bold text-base w-28"
                                style={{ color }} />
                              <span className="text-xs text-ink-40 font-condensed">{ci.symbol}</span>
                            </div>
                          </div>
                          <div>
                            <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">Devaluación anual</p>
                            <div className="flex items-center gap-1.5">
                              <input type="number" value={((mkt.fxDevaluation || 0) * 100).toFixed(1)} min={0} max={200} step={0.5}
                                onChange={e => setMkt(key, 'fxDevaluation', (parseFloat(e.target.value) || 0) / 100)}
                                className="bg-white border border-ash text-right px-2 py-1 font-condensed font-bold text-base w-20"
                                style={{ color }} />
                              <span className="text-xs text-ink-40 font-condensed">% / año</span>
                            </div>
                            <p className="text-xs text-ink-20 font-condensed mt-1">
                              FX 2030: {fx5.toLocaleString('en', { maximumFractionDigits: 0 })} {ci.symbol}
                            </p>
                          </div>
                        </div>
                      </div>
                    );
                  })()}

                  {/* ── UNIT ECONOMICS ── */}
                  {(() => {
                    const ci = CURRENCY_INFO[mkt.code] || { symbol: 'USD' };
                    const isLocal = (mkt.inputCurrency || 'USD') === 'local';
                    const fx = mkt.fxRate || 1;
                    const sym = ci.symbol;
                    const isUSD = sym === 'USD';

                    const displayPrice = isLocal ? (mkt.priceUSD * fx).toFixed(isUSD ? 2 : 0) : mkt.priceUSD;
                    const displayCogs  = isLocal ? (mkt.cogsUSD  * fx).toFixed(isUSD ? 2 : 0) : mkt.cogsUSD;
                    const priceStep    = isLocal ? (fx >= 100 ? 10 : fx >= 10 ? 1 : 0.1) : 0.01;
                    const cogsStep     = isLocal ? (fx >= 100 ? 10 : fx >= 10 ? 1 : 0.1) : 0.01;
                    const gpPct        = mkt.priceUSD > 0 ? ((1 - mkt.cogsUSD / mkt.priceUSD) * 100).toFixed(0) : 0;
                    const contribUSD   = (mkt.priceUSD - mkt.cogsUSD).toFixed(2);
                    const contribLocal = ((mkt.priceUSD - mkt.cogsUSD) * fx).toLocaleString('en', { maximumFractionDigits: 0 });

                    return (
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">
                            Precio de venta ({isLocal && !isUSD ? `${sym}/lata` : 'USD/lata'})
                          </p>
                          <div className="flex items-center gap-1">
                            <span className="text-ink-60 font-condensed text-sm">{isLocal && !isUSD ? sym : '$'}</span>
                            <input type="number" value={displayPrice}
                              min={isLocal ? priceStep : 0.1} max={isLocal ? fx * 20 : 20} step={priceStep}
                              onChange={e => {
                                const v = parseFloat(e.target.value) || 0;
                                setMkt(key, 'priceUSD', isLocal ? v / fx : v);
                              }}
                              className="bg-white border border-ash text-gold text-right px-2 py-1 font-condensed font-bold text-xl w-28" />
                          </div>
                          <p className="text-xs font-condensed mt-1" style={{ color }}>
                            {isLocal && !isUSD
                              ? `= $${mkt.priceUSD.toFixed(2)} USD · Margen: ${gpPct}%`
                              : (!isUSD
                                  ? `= ${sym} ${(mkt.priceUSD * fx).toLocaleString('en', { maximumFractionDigits: 0 })} · Margen: ${gpPct}%`
                                  : `Margen: ${gpPct}% · $${contribUSD}/lata`
                                )
                            }
                          </p>
                        </div>
                        <div>
                          <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-1">
                            COGS ({isLocal && !isUSD ? `${sym}/lata` : 'USD/lata'})
                          </p>
                          <div className="flex items-center gap-1">
                            <span className="text-ink-60 font-condensed text-sm">{isLocal && !isUSD ? sym : '$'}</span>
                            <input type="number" value={displayCogs}
                              min={isLocal ? cogsStep : 0.01} max={isLocal ? fx * 20 : 20} step={cogsStep}
                              onChange={e => {
                                const v = parseFloat(e.target.value) || 0;
                                setMkt(key, 'cogsUSD', isLocal ? v / fx : v);
                              }}
                              className="bg-white border border-ash text-red-600 text-right px-2 py-1 font-condensed font-bold text-xl w-28" />
                          </div>
                          <p className="text-xs text-ink-40 font-condensed mt-1">
                            {isLocal && !isUSD
                              ? `= $${mkt.cogsUSD.toFixed(2)} USD · Contribución: ${sym} ${contribLocal}/lata`
                              : (!isUSD
                                  ? `${sym} ${(mkt.cogsUSD * fx).toLocaleString('en', { maximumFractionDigits: 0 })} · $${contribUSD}/lata`
                                  : (CAN_MAP[mkt.canFormat || '355ml']?.volML
                                      ? `${CAN_MAP[mkt.canFormat || '355ml'].volML}ml · $${(mkt.cogsUSD / (CAN_MAP[mkt.canFormat || '355ml'].volML / 1000)).toFixed(2)}/litro`
                                      : `$${contribUSD}/lata contribución`)
                                )
                            }
                          </p>
                        </div>
                      </div>
                    );
                  })()}

                  {/* Penetration table */}
                  <div>
                    <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider mb-2">
                      Penetración de mercado (% del TAM) — editá año por año
                    </p>
                    <div className="overflow-x-auto">
                      <table className="w-full text-xs font-condensed">
                        <thead>
                          <tr>
                            <td className="text-ink-40 pr-3 py-1">Año</td>
                            {YEARS.map(y => (
                              <td key={y} className={`text-center px-2 py-1 ${y < mkt.openYear ? 'text-ink-20' : 'text-ink-60'}`}>{y}</td>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          <tr>
                            <td className="text-ink-40 pr-3 py-1">Penet. %</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className="px-1 py-1">
                                  <input
                                    type="number" value={pct} min={0} max={100} step={0.01}
                                    disabled={inactive}
                                    onChange={e => setPenet(key, i, parseFloat(e.target.value) || 0)}
                                    className={`text-center w-16 px-1 py-0.5 font-condensed font-bold text-sm ${
                                      inactive
                                        ? 'bg-transparent text-ink-20 cursor-not-allowed'
                                        : 'bg-white border border-ash text-gold'
                                    }`}
                                  />
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-ink-20 pr-3 py-1 text-right leading-tight">TAM<br/>año</td>
                            {YEARS.map((y, i) => {
                              const cagr = mkt.marketCAGR || 0;
                              const tamY = mkt.tamUnits * Math.pow(1 + cagr, i);
                              return (
                                <td key={y} className="text-center px-2 py-1 text-ink-20 text-xs">
                                  {tamY >= 1e9 ? `${(tamY/1e9).toFixed(1)}B` : `${(tamY/1e6).toFixed(0)}M`}
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-ink-40 pr-3 py-1">Volumen</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const cagr = mkt.marketCAGR || 0;
                              const tamY = mkt.tamUnits * Math.pow(1 + cagr, i);
                              const vol = tamY * Math.min((pct / 100) * mult, 0.99);
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className={`text-center px-2 py-1 ${inactive ? 'text-ink-20' : 'text-ink-60'}`}>
                                  {inactive ? '—' : vol >= 1e6 ? `${(vol/1e6).toFixed(1)}M` : vol >= 1e3 ? `${(vol/1e3).toFixed(0)}K` : vol.toFixed(0)}
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-ink-40 pr-3 py-1">Revenue</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const cagr = mkt.marketCAGR || 0;
                              const tamY = mkt.tamUnits * Math.pow(1 + cagr, i);
                              const vol = tamY * Math.min((pct / 100) * mult, 0.99);
                              const rev = (vol / 1000) * mkt.priceUSD;
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className={`text-center px-2 py-1 font-bold ${inactive ? 'text-ink-20' : 'text-ink'}`}>
                                  {inactive ? '—' : fmt(rev * 1000)}
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-ink-40 pr-3 py-1">GP</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const cagr = mkt.marketCAGR || 0;
                              const tamY = mkt.tamUnits * Math.pow(1 + cagr, i);
                              const vol = tamY * Math.min((pct / 100) * mult, 0.99);
                              const gp = (vol / 1000) * (mkt.priceUSD - mkt.cogsUSD);
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className={`text-center px-2 py-1 ${inactive ? 'text-ink-20' : 'text-emerald-700'}`}>
                                  {inactive ? '—' : fmt(gp * 1000)}
                                </td>
                              );
                            })}
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Revenue by market stacked bar */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Revenue total por mercado ($K USD)</p>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={marketData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => v >= 1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Inter, Helvetica Neue, sans-serif', color: MUTED }} />
            {Object.entries(state.markets).map(([key, mkt]) => (
              mkt.active && <Bar key={key} dataKey={mkt.country} stackId="a" fill={mkt.color || GOLD} />
            ))}
          </BarChart>
        </ResponsiveContainer>
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE 2: FINANCING
// ─────────────────────────────────────────────
function Module2({ state, setState }) {
  const fin = useMemo(() => buildFinancials(state), [state]);
  const dcf = useMemo(() => calcDCF(state), [state]);

  // Equity value trajectory
  const equityData = YEARS.map(y => {
    const annualEV = (() => {
      const s = { ...state };
      const revScale = fin[y]?.revenue / (fin[2030]?.revenue || 1);
      return dcf.evPerpetual * Math.pow(revScale, 0.5) * (fin[2030]?.revenue > 0 ? 1 : 0.1);
    })();
    const founderPct = 1 - state.equityDilution;
    return {
      year: y,
      'EV Total': Math.round(annualEV),
      'Founder Value': Math.round(annualEV * founderPct),
      'Investor Value': Math.round(annualEV * state.equityDilution),
    };
  });

  // Debt service schedule
  const debtData = FORECAST_YEARS.map(y => {
    const ds = calcDebtService(state, y);
    const ebitda = fin[y]?.ebitda || 0;
    const icr = ds > 0 ? ebitda / ds : null;
    return { year: y, 'Debt Service': Math.round(ds), EBITDA: Math.round(ebitda), ICR: icr };
  });

  const equityPath = state.financingMode === 'equity' || state.financingMode === 'mixed';
  const debtPath = state.financingMode === 'debt' || state.financingMode === 'mixed';

  // Cost comparison
  const dilutionCost = dcf.evPerpetual * state.equityDilution;
  const debtTotalCost = state.debtAmount * state.debtInterestRate * state.debtTermYears;

  return (
    <div className="p-4 space-y-6">
      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-ink-60 uppercase tracking-widest mb-2">Conclusión: ¿deuda o equity?</p>
        <p className="text-base font-condensed font-bold text-gold">
          Deuda cuesta <span className="text-ink">${(debtTotalCost/1000).toFixed(0)}K</span> total en intereses ·
          Dilución cuesta <span className="text-ink">{fmtPct(state.equityDilution)}</span> de EV ({fmt(dilutionCost * 1000)})
        </p>
        <p className="text-sm font-condensed text-ink-60 mt-1">
          {dilutionCost > debtTotalCost
            ? '→ Si confías en el modelo, la deuda preserva más upside para los founders.'
            : '→ La dilución es más barata que los intereses proyectados — considerá equity.'}
        </p>
      </div>

      {/* Mode selector */}
      <div className="flex gap-2">
        {['equity', 'debt', 'mixed'].map(mode => (
          <button key={mode}
            onClick={() => setState(s => ({ ...s, financingMode: mode }))}
            className={`px-4 py-2 font-condensed font-bold text-sm uppercase tracking-wider ${state.financingMode === mode ? 'bg-gold text-black' : 'border border-ink-20 text-ink-60'}`}>
            {mode === 'equity' ? 'Solo Equity' : mode === 'debt' ? 'Solo Deuda' : 'Mixto'}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Equity inputs */}
        {equityPath && (
          <div className="border border-ash bg-ink-5 p-4">
            <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Equity</p>
            <Slider label="Capital levantado" value={state.capitalNeeded} min={500} max={20000} step={100}
              onChange={v => setState(s => ({ ...s, capitalNeeded: v }))}
              format={v => fmt(v * 1000)} />
            <Slider label="Dilución %" value={state.equityDilution} min={0.01} max={0.50} step={0.005}
              onChange={v => setState(s => ({ ...s, equityDilution: v }))}
              format={v => fmtPct(v)} />
            <Slider label="Valuación pre-money" value={state.currentEquityValue} min={5000} max={200000} step={1000}
              onChange={v => setState(s => ({ ...s, currentEquityValue: v }))}
              format={v => fmt(v * 1000)} />
            <div className="mt-4 grid grid-cols-2 gap-2 text-xs font-condensed">
              <div className="bg-ink-5 p-2">
                <p className="text-ink-60">Pre-money EV</p>
                <p className="text-xl font-bold text-ink">${(state.currentEquityValue/1000).toFixed(1)}M</p>
              </div>
              <div className="bg-ink-5 p-2">
                <p className="text-ink-60">Post-money EV</p>
                <p className="text-xl font-bold text-gold">${((state.currentEquityValue + state.capitalNeeded)/1000).toFixed(1)}M</p>
              </div>
              <div className="bg-ink-5 p-2">
                <p className="text-ink-60">Founder retains</p>
                <p className="text-xl font-bold text-emerald-700">{fmtPct(1 - state.equityDilution)}</p>
              </div>
              <div className="bg-ink-5 p-2">
                <p className="text-ink-60">Founder EV @ exit</p>
                <p className="text-xl font-bold text-ink">{fmt(dcf.evPerpetual * (1 - state.equityDilution) * 1000)}</p>
              </div>
            </div>
          </div>
        )}

        {/* Debt inputs */}
        {debtPath && (
          <div className="border border-ash bg-ink-5 p-4">
            <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Deuda</p>
            <Slider label="Monto deuda" value={state.debtAmount} min={0} max={10000} step={100}
              onChange={v => setState(s => ({ ...s, debtAmount: v }))}
              format={v => fmt(v * 1000)} />
            <Slider label="Tasa de interés" value={state.debtInterestRate} min={0.05} max={0.60} step={0.01}
              onChange={v => setState(s => ({ ...s, debtInterestRate: v }))}
              format={v => fmtPct(v)} />
            <Slider label="Plazo (años)" value={state.debtTermYears} min={1} max={7} step={1}
              onChange={v => setState(s => ({ ...s, debtTermYears: v }))}
              format={v => `${v}y`} />
            <ResponsiveContainer width="100%" height={140}>
              <BarChart data={debtData}>
                <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />

                <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `$${(v/1000).toFixed(0)}K`} />
                <Tooltip content={<CustomTooltip />} />
                <Bar dataKey="Debt Service" fill={RED} fillOpacity={0.7} />
                <Bar dataKey="EBITDA" fill={GOLD} fillOpacity={0.3} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        )}
      </div>

      {/* Equity value chart */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Valor equity — founders vs inversores</p>
        <ResponsiveContainer width="100%" height={180}>
          <AreaChart data={equityData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />

}

// MODULE 3: CHANNEL MARGIN
// ─────────────────────────────────────────────
function Module3({ state, setState }) {
  const channelMargins = useMemo(() => calcChannelMargins(state), [state]);
  const blended = useMemo(() => calcBlendedMargin(channelMargins), [channelMargins]);

  const [shiftFrom, setShiftFrom] = useState('wholesale');
  const [shiftTo, setShiftTo] = useState('rappi');
  const [shiftPct, setShiftPct] = useState(0.05);

  const shiftedChannels = useMemo(() => {
    const chs = { ...state.channels };
    const from = { ...chs[shiftFrom] };
    const to = { ...chs[shiftTo] };
    from.share = Math.max(0, from.share - shiftPct);
    to.share = Math.min(1, to.share + shiftPct);
    return { ...chs, [shiftFrom]: from, [shiftTo]: to };
  }, [state.channels, shiftFrom, shiftTo, shiftPct]);

  const shiftedMargins = useMemo(() => calcChannelMargins({ ...state, channels: shiftedChannels }), [state, shiftedChannels]);
  const shiftedBlended = useMemo(() => calcBlendedMargin(shiftedMargins), [shiftedMargins]);
  const marginDelta = shiftedBlended - blended;

  const chartData = Object.entries(channelMargins)
    .map(([key, ch]) => ({
      channel: ch.label || key,
      'Gross Margin %': Math.round(ch.grossMarginPct * 100 * 10) / 10,
      'Contrib/Unit ($)': Math.round(ch.contribPerUnit * 100) / 100,
      share: ch.share,
    }))
    .sort((a, b) => b['Gross Margin %'] - a['Gross Margin %']);

  const bestChannel = chartData[0];

  return (
    <div className="p-4 space-y-6">
      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-ink-60 uppercase tracking-widest mb-1">Conclusión del canal</p>

          Mejor margen: <span className="text-ink">{bestChannel?.channel}</span> con{' '}
          <span className="text-ink">{bestChannel?.['Gross Margin %'].toFixed(1)}%</span> de margen bruto.
          Blended actual: <span className="text-ink">{fmtPct(blended)}</span>
        </p>
        <p className="text-sm font-condensed text-ink-60 mt-1">
          {`Mover 10% de ${Object.values(channelMargins).sort((a,b) => a.grossMarginPct - b.grossMarginPct)[0]?.label} → ${bestChannel?.channel} agrega ~${fmtPct(Math.abs(chartData[0]?.['Gross Margin %']/100 - Object.values(channelMargins).sort((a,b) => a.grossMarginPct - b.grossMarginPct)[0]?.grossMarginPct) * 0.1)} al margen blended.`}
        </p>
      </div>

      {/* Nota aclaratoria */}
      <div className="border border-ash p-3 text-xs font-condensed text-ink-60 space-y-1.5 bg-ink-5">
        <p className="font-semibold text-ink uppercase tracking-wider text-xs">¿Para qué sirve este tab?</p>
        <p>Acá definís la <strong className="text-ink">economía unitaria por canal</strong>: precio de venta, COGS y fee de distribución. El <strong className="text-ink">margen blended</strong> es el promedio ponderado por share de cada canal.</p>
        <p className="text-gold font-semibold">⚠ Este análisis es estratégico — no modifica el P&L ni la valuación.</p>
        <p>El revenue del modelo (tabs P&L, Caja, Valuación) se calcula con el <strong className="text-ink">precio por mercado del Tab 01</strong>. Este tab te ayuda a entender <em>por qué canal conviene crecer</em>: si tu próximo peso va a Rappi (margen alto, costo de adquisición bajo) vs Mayorista (margen bajo, volumen alto), ese mix afecta el margen bruto real cuando lo repliques en Tab 01.</p>
        <p>El <strong className="text-ink">Simulador de mix</strong> muestra el delta de margen si movés share de un canal a otro — usalo para decidir dónde invertir en trade marketing.</p>

      {/* Editable channel table */}

        <table className="w-full text-xs font-condensed">

                    {fmtPct(cm.grossMarginPct)}

        </table>
        <div className="flex items-center justify-between mt-2 pt-2 border-t border-ink-20">
          <span className="text-xs font-condensed text-ink-60">Margen blended</span>
          <span className="text-xl font-condensed font-bold text-gold">{fmtPct(blended)}</span>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Margin chart */}
        <div className="border border-ash bg-ink-5 p-4">

              <span className="text-ink-60 w-12">From</span>

              </select>
            </div>
            <div className="flex gap-2 items-center">
              <span className="text-ink-60 w-12">To</span>
              <select value={shiftTo} onChange={e => setShiftTo(e.target.value)}

                {Object.entries(state.channels).map(([k, ch]) => <option key={k} value={k}>{ch.label}</option>)}

            </div>
            <Slider label="Share a mover" value={shiftPct} min={0.01} max={0.20} step={0.01}

            <div className="border border-ink-20 p-3 mt-2">

    moderada:    { arInflation: 0.55, arFXDevaluation: 0.40, latamInflation: 0.10, usInflation: 0.04 },
    crisis:      { arInflation: 1.00, arFXDevaluation: 0.80, latamInflation: 0.20, usInflation: 0.06 },
  };

  const applyPreset = (preset) => setState(s => ({ ...s, ...PRESETS[preset] }));

  const macroData = YEARS.map(y => {
    const fxRate = state.arFX * Math.pow(1 + state.arFXDevaluation, y - 2025);
    const baseState = { ...state, arFXDevaluation: 0.15 };
    const crisisState = { ...state, arFXDevaluation: 0.80 };
    const baseRev = calcRevenue(baseState, y);
    const currentRev = calcRevenue(state, y);
    const crisisRev = calcRevenue(crisisState, y);
    const ebitda = calcEBITDA(state, y);
    const ebitdaMargin = currentRev > 0 ? ebitda / currentRev : 0;
    return {
      year: y,
      'Rev (Base FX)': Math.round(baseRev),
      'Rev (Current FX)': Math.round(currentRev),
      'Rev (Crisis FX)': Math.round(crisisRev),
      'EBITDA %': Math.round(ebitdaMargin * 100 * 10) / 10,
    };
  });

  const revenueImpact = (() => {
    const crisisState = { ...state, arFXDevaluation: 0.80 };
    const baseRev2030 = calcRevenue(state, 2030);
    const crisisRev2030 = calcRevenue(crisisState, 2030);
    return baseRev2030 - crisisRev2030;
  })();

  return (
    <div className="p-4 space-y-6">

        <p className="text-gold font-semibold">Uso recomendado: elegí un preset de escenario macro, anotá el FX proyectado para 2027-2030, y actualizá el precio en pesos en Tab 01 para validar que tu precio en ARS sea competitivo y cubra costos.</p>

          { key: 'moderada', label: 'Dev. Moderada', desc: '55% inf · 40% dev' },
          { key: 'crisis', label: 'Crisis Cambiaria', desc: '100% inf · 80% dev' },

          <button key={key}

              { label: 'FX 2026', value: `${(state.arFX * (1 + state.arFXDevaluation)).toLocaleString('en', {maximumFractionDigits: 0})} ARS` },

      {/* Revenue comparison chart */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Revenue USD bajo distintos escenarios FX</p>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={macroData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis yAxisId="rev" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `$${(v/1000).toFixed(0)}M`} />
            <YAxis yAxisId="margin" orientation="right" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `${v}%`} domain={[-50, 20]} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Inter, Helvetica Neue, sans-serif', color: MUTED }} />
            <Line yAxisId="rev" dataKey="Rev (Base FX)" stroke={GREEN} strokeWidth={2} strokeDasharray="4 2" dot={false} />
            <Line yAxisId="rev" dataKey="Rev (Current FX)" stroke={GOLD} strokeWidth={2} dot={{ fill: GOLD, r: 3 }} />
            <Line yAxisId="rev" dataKey="Rev (Crisis FX)" stroke={RED} strokeWidth={2} strokeDasharray="2 2" dot={false} />
            <Line yAxisId="margin" dataKey="EBITDA %" stroke={CYAN} strokeWidth={1} dot={false} />

}

        <span className="text-ink-60">EBITDA 2030: <span className={fin[2030]?.ebitda >= 0 ? 'text-emerald-700 font-bold' : 'text-red-600 font-bold'}>{fmt(fin[2030]?.ebitda * 1000)}</span></span>
