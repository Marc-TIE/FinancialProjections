const INITIAL_STATE = {

  // Markets keyed by country code — add/remove dynamically
  markets: {
    AR: {
      active: true, openYear: 2025, code: 'AR', country: 'Argentina', flag: '🇦🇷', color: '#F7AF1C',
      tamUnits: 500000000,
      penetration: [0.18, 2.21, 10.98, 30.06, 58.60, 80.14],
      priceUSD: 1.10, cogsUSD: 0.68,
    },
  },
  cogsPerUnit: 0.68,
  sgaPercent: 0.395,
  channels: {
    supermarket:    { share: 0.40, priceUSD: 1.10, cogsUSD: 0.68, distribFee: 0.18, label: 'Supermercado' },
    convenienceYPF: { share: 0.20, priceUSD: 1.30, cogsUSD: 0.68, distribFee: 0.10, label: 'YPF / Kiosco' },
    rappi:          { share: 0.15, priceUSD: 1.50, cogsUSD: 0.68, distribFee: 0.25, label: 'Rappi' },
    wholesale:      { share: 0.25, priceUSD: 0.95, cogsUSD: 0.68, distribFee: 0.05, label: 'Mayorista' },
  },
  daysAR: 45,
  daysInventory: 20,
  daysAP: 30,
  capex: [8800, 3520, 1760, 880, 440],
  financingMode: 'equity',
  capitalNeeded: 4000,
  equityDilution: 0.117,
  debtAmount: 0,
  debtInterestRate: 0.18,
  debtTermYears: 3,
  currentEquityValue: 30000,
  wacc: 0.101,
  terminalGrowthRate: 0.07,
  terminalEBITDAMultiple: 15,
  taxRate: 0.30,
  scenario: 'base',
  scenarioMultipliers: { best: 1.20, base: 1.00, worst: 0.80 },
  displayCurrency: 'USD',
};

const YEARS = [2025, 2026, 2027, 2028, 2029, 2030];
const FORECAST_YEARS = [2026, 2027, 2028, 2029, 2030];
const GOLD = '#F7AF1C';
const RED = '#ef4444';
const GREEN = '#4ade80';
const BLUE = '#60a5fa';
const PURPLE = '#a78bfa';
const CYAN = '#22d3ee';
const MUTED = 'rgba(255,255,255,0.4)';

// ─────────────────────────────────────────────
// MODEL FUNCTIONS
// ─────────────────────────────────────────────

function calcFXRate(state, year) {
  const yearsOut = year - 2025;
  return state.arFX * Math.pow(1 + state.arFXDevaluation, yearsOut);
}

// Core: TAM × penetration% → units
function calcMarketVolume(mkt, yearIdx, mult) {
  const idx = Math.min(yearIdx, (mkt.penetration || []).length - 1);
  const basePct = (mkt.penetration[idx] || 0) / 100;
  return mkt.tamUnits * Math.min(basePct * mult, 0.99);
}

function calcVolume(state, year) {
  const mult = state.scenarioMultipliers[state.scenario];
  const yearIdx = year - 2025;
  let vol = 0;
  for (const mkt of Object.values(state.markets)) {
    if (mkt.active && year >= mkt.openYear) vol += calcMarketVolume(mkt, yearIdx, mult);
  }
  return vol;
}

function calcRevenue(state, year) {
  const mult = state.scenarioMultipliers[state.scenario];
  const yearIdx = year - 2025;
  let rev = 0;
  for (const mkt of Object.values(state.markets)) {
    if (mkt.active && year >= mkt.openYear) {
      rev += (calcMarketVolume(mkt, yearIdx, mult) / 1000) * (mkt.priceUSD || state.cogsPerUnit);
    }
  }
  return rev; // $K USD
}

function calcCOGS(state, year) {
  const mult = state.scenarioMultipliers[state.scenario];
  const yearIdx = year - 2025;
  let cogs = 0;
  for (const mkt of Object.values(state.markets)) {
    if (mkt.active && year >= mkt.openYear) {
      cogs += (calcMarketVolume(mkt, yearIdx, mult) / 1000) * (mkt.cogsUSD || state.cogsPerUnit);
    }
  }
  return cogs; // $K USD
}

function calcGrossProfit(state, year) {
  return calcRevenue(state, year) - calcCOGS(state, year);
}

function calcSGA(state, year) {
  return calcRevenue(state, year) * state.sgaPercent;
}

function calcEBITDA(state, year) {
  return calcGrossProfit(state, year) - calcSGA(state, year);
}

function calcDepreciation(state, year) {
  // From Excel: capex depreciates over 20 years, half in first year
  const capexSchedule = { 2026: state.capex[0], 2027: state.capex[1], 2028: state.capex[2], 2029: state.capex[3], 2030: state.capex[4] };
  let dep = 0;
  for (let capexYear = 2026; capexYear <= year; capexYear++) {
    const capexAmt = capexSchedule[capexYear] || 0;
    const annualDep = capexAmt / 20;
    const yearsActive = year - capexYear;
    if (yearsActive === 0) dep += annualDep * 0.5;
    else dep += annualDep;
  }
  return dep;
}

function calcEBIT(state, year) {
  return calcEBITDA(state, year) - calcDepreciation(state, year);
}

function calcWorkingCapital(state, year) {
  const rev = calcRevenue(state, year);
  const cogs = calcCOGS(state, year);
  const ar = (rev / 365) * state.daysAR;
  const inv = (cogs / 365) * state.daysInventory;
  const ap = (cogs / 365) * state.daysAP;
  return ar + inv - ap;
}

function calcDeltaWC(state, year) {
  if (year <= 2025) return 0;
  return calcWorkingCapital(state, year) - calcWorkingCapital(state, year - 1);
}

function calcTax(state, year) {
  const ebit = calcEBIT(state, year);
  if (ebit <= 0) return 0;
  return ebit * state.taxRate;
}

function calcNOPAT(state, year) {
  return calcEBIT(state, year) - calcTax(state, year);
}

function calcFCF(state, year) {
  if (year <= 2025) return null;
  const ebitda = calcEBITDA(state, year);
  const tax = calcTax(state, year);
  const capex = state.capex[year - 2026] || 0;
  const deltaWC = calcDeltaWC(state, year);
  return ebitda - tax - capex - deltaWC;
}

function calcDebtService(state, year) {
  if (state.financingMode === 'equity') return 0;
  if (state.debtAmount <= 0) return 0;
  const startYear = 2026;
  const endYear = startYear + state.debtTermYears - 1;
  if (year < startYear || year > endYear) return 0;
  const annualPrincipal = state.debtAmount / state.debtTermYears;
  const remainingDebt = state.debtAmount - (year - startYear) * annualPrincipal;
  const interest = remainingDebt * state.debtInterestRate;
  return annualPrincipal + interest;
}

function calcDCF(state) {
  const wacc = state.wacc;
  const tg = state.terminalGrowthRate;
  let pvSum = 0;
  let pvFCFs = {};

  for (let year = 2026; year <= 2030; year++) {
    const fcf = calcFCF(state, year);
    const t = year - 2025; // years from end of 2025
    const pv = fcf / Math.pow(1 + wacc, t);
    pvSum += pv;
    pvFCFs[year] = pv;
  }

  // Terminal value (perpetuity method)
  const termFCF = calcFCF(state, 2030);
  const terminalValue = (termFCF * (1 + tg)) / (wacc - tg);
  const pvTerminal = terminalValue / Math.pow(1 + wacc, 5);

  // Multiple method terminal value
  const termEBITDA = calcEBITDA(state, 2030);
  const tvMultiple = termEBITDA * state.terminalEBITDAMultiple;
  const pvTerminalMultiple = tvMultiple / Math.pow(1 + wacc, 5);

  const evPerpetual = pvSum + pvTerminal;
  const evMultiple = pvSum + pvTerminalMultiple;

  return {
    pvFCFs,
    pvSum,
    pvTerminal,
    pvTerminalMultiple,
    terminalValue,
    tvMultiple,
    evPerpetual,
    evMultiple,
    equityValuePerpetual: evPerpetual,
    equityValueMultiple: evMultiple,
  };
}

function calcChannelMargins(state) {
  const results = {};
  for (const [key, ch] of Object.entries(state.channels)) {
    const netRev = ch.priceUSD * (1 - ch.distribFee);
    const grossMargin = (netRev - ch.cogsUSD) / netRev;
    const contribPerUnit = netRev - ch.cogsUSD;
    const contribPerSGA = contribPerUnit / (ch.priceUSD * state.sgaPercent);
    results[key] = {
      ...ch,
      netRevPerUnit: netRev,
      grossMarginPct: grossMargin,
      contribPerUnit,
      contribPerSGA,
    };
  }
  return results;
}

function calcBlendedMargin(channels) {
  let totalShare = 0, weightedMargin = 0;
  for (const ch of Object.values(channels)) {
    totalShare += ch.share;
    weightedMargin += ch.share * ch.grossMarginPct;
  }
  return totalShare > 0 ? weightedMargin / totalShare : 0;
}

function calcFXImpact(state, year) {
  const fxRate = calcFXRate(state, year);
  const rev = calcRevenue(state, year);
  return { fxRate, revUSD: rev, revARS: rev * fxRate };
}

function calcEquityValue(state) {
  return calcDCF(state).evPerpetual;
}

function buildFinancials(state) {
  const rows = {};
  for (const year of YEARS) {
    rows[year] = {
      revenue: calcRevenue(state, year),
      cogs: calcCOGS(state, year),
      grossProfit: calcGrossProfit(state, year),
      sga: calcSGA(state, year),
      ebitda: calcEBITDA(state, year),
      depreciation: year > 2025 ? calcDepreciation(state, year) : 0,
      ebit: year > 2025 ? calcEBIT(state, year) : calcEBITDA(state, year),
      tax: calcTax(state, year),
      nopat: calcNOPAT(state, year),
      workingCapital: calcWorkingCapital(state, year),
      deltaWC: calcDeltaWC(state, year),
      capex: year > 2025 ? (state.capex[year - 2026] || 0) : 0,
      fcf: calcFCF(state, year),
      debtService: calcDebtService(state, year),
    };
  }
  return rows;
}

// ─────────────────────────────────────────────
// FORMAT HELPERS
// ─────────────────────────────────────────────
function fmt(val, decimals = 0) {
  if (val === null || val === undefined) return '—';
  const abs = Math.abs(val);
  if (abs >= 1000000) return `${val < 0 ? '-' : ''}$${(abs / 1000000).toFixed(1)}M`;
  if (abs >= 1000) return `${val < 0 ? '-' : ''}$${(abs / 1000).toFixed(decimals)}K`;
  return `${val < 0 ? '-' : ''}$${abs.toFixed(decimals)}`;
}
function fmtK(val) {
  if (val === null || val === undefined) return '—';
  if (val < 0) return `(${Math.abs(val).toLocaleString('en', {maximumFractionDigits: 0})})`;
  return val.toLocaleString('en', {maximumFractionDigits: 0});
}
function fmtPct(val, d = 1) {
  if (val === null || val === undefined) return '—';
  return `${(val * 100).toFixed(d)}%`;
}
function fmtM(val) {
  if (val === null || val === undefined) return '—';
  const abs = Math.abs(val) / 1000;
  if (val < 0) return `($${abs.toFixed(0)}K)`;
  return `$${abs.toFixed(0)}K`;
}
function colorVal(val) {
  if (val === null || val === undefined) return '';
  return val >= 0 ? 'text-green-400' : 'text-red-400';
}

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: '#111', border: '1px solid rgba(247,175,28,0.3)', padding: '8px 12px', fontFamily: 'Barlow Condensed' }}>
      <p style={{ color: '#F7AF1C', fontWeight: 600, marginBottom: 4 }}>{label}</p>
      {payload.map((p, i) => (
        <p key={i} style={{ color: p.color || '#fff', fontSize: 13 }}>
          {p.name}: {typeof p.value === 'number' ? (p.value >= 1000 ? `$${(p.value).toLocaleString('en', {maximumFractionDigits: 0})}K` : `$${p.value.toLocaleString('en', {maximumFractionDigits: 1})}K`) : p.value}
        </p>
      ))}
    </div>
  );
};

// ─────────────────────────────────────────────
// SLIDER COMPONENT
// ─────────────────────────────────────────────
function Slider({ label, value, min, max, step, onChange, format }) {
  return (
    <div className="mb-3">
      <div className="flex justify-between mb-1">
        <span className="text-xs font-condensed text-white-60 uppercase tracking-wider">{label}</span>
        <span className="text-sm font-condensed font-bold text-gold">{format ? format(value) : value}</span>
      </div>
      <input
        type="range" min={min} max={max} step={step}
        value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        className="w-full"
      />
    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE 5: DCF VALUATION
// ─────────────────────────────────────────────
function Module5({ state, setState }) {
  const fin = useMemo(() => buildFinancials(state), [state]);
  const dcf = useMemo(() => calcDCF(state), [state]);

  const scenarioResults = useMemo(() => {
    return ['best', 'base', 'worst'].map(sc => {
      const s = { ...state, scenario: sc };
      const d = calcDCF(s);
      return { sc, ev: d.evPerpetual, evMult: d.evMultiple };
    });
  }, [state]);

  // WACC sensitivity table
  const waccRange = [0.08, 0.09, 0.10, 0.11, 0.12, 0.13];
  const tgRange = [0.05, 0.06, 0.07, 0.08, 0.09];

  const sensitivityTable = useMemo(() => {
    return tgRange.map(tg => ({
      tg,
      values: waccRange.map(w => {
        const s = { ...state, wacc: w, terminalGrowthRate: tg };
        return calcDCF(s).evPerpetual;
      })
    }));
  }, [state]);

  const fcfData = FORECAST_YEARS.map(y => ({
    year: y,
    FCF: Math.round(fin[y]?.fcf || 0),
    Revenue: Math.round(fin[y]?.revenue || 0),
    EBITDA: Math.round(fin[y]?.ebitda || 0),
  }));

  return (
    <div className="p-4 space-y-6">
      {/* Header answer */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-white-60 uppercase tracking-widest mb-1">Valuación base case hoy</p>
        <div className="flex gap-8 flex-wrap">
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">EV (Perpetuity)</p>
            <p className="text-4xl font-condensed font-bold text-gold">{fmt(dcf.evPerpetual * 1000)}</p>
          </div>
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">EV (Exit Multiple)</p>
            <p className="text-4xl font-condensed font-bold text-white">{fmt(dcf.evMultiple * 1000)}</p>
          </div>
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">EV / Revenue 2030</p>
            <p className="text-4xl font-condensed font-bold text-white">
              {fin[2030]?.revenue > 0 ? `${((dcf.evPerpetual) / fin[2030].revenue).toFixed(1)}x` : '—'}
            </p>
          </div>
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">EV / EBITDA 2030</p>
            <p className="text-4xl font-condensed font-bold text-white">
              {fin[2030]?.ebitda > 0 ? `${((dcf.evPerpetual) / fin[2030].ebitda).toFixed(1)}x` : '—'}
            </p>
          </div>
        </div>
      </div>

      {/* Scenario comparison */}
      <div className="grid grid-cols-3 gap-2">
        {scenarioResults.map(({ sc, ev }) => (
          <div key={sc}
            className={`border p-3 cursor-pointer ${state.scenario === sc ? 'border-gold bg-gold-dim' : 'border-white-20 bg-white-5'}`}
            onClick={() => setState(s => ({ ...s, scenario: sc }))}>
            <p className="text-xs font-condensed uppercase text-white-60">{sc === 'best' ? 'Best Case' : sc === 'base' ? 'Base Case' : 'Worst Case'}</p>
            <p className="text-2xl font-condensed font-bold text-white">{fmt(ev * 1000)}</p>
            <p className="text-xs text-white-60">Perpetuity EV</p>
          </div>
        ))}
      </div>

      {/* DCF inputs */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">DCF Inputs</p>
          <Slider label="WACC" value={state.wacc} min={0.06} max={0.20} step={0.001}
            onChange={v => setState(s => ({ ...s, wacc: v }))}
            format={v => fmtPct(v)} />
          <Slider label="Terminal Growth Rate" value={state.terminalGrowthRate} min={0.02} max={0.12} step={0.005}
            onChange={v => setState(s => ({ ...s, terminalGrowthRate: v }))}
            format={v => fmtPct(v)} />
          <Slider label="Exit EBITDA Multiple" value={state.terminalEBITDAMultiple} min={5} max={30} step={0.5}
            onChange={v => setState(s => ({ ...s, terminalEBITDAMultiple: v }))}
            format={v => `${v}x`} />
          <Slider label="Tax Rate" value={state.taxRate} min={0.10} max={0.45} step={0.01}
            onChange={v => setState(s => ({ ...s, taxRate: v }))}
            format={v => fmtPct(v)} />
        </div>

        {/* P&L summary */}
        <div className="md:col-span-2 border border-white-10 bg-white-5 p-4 overflow-x-auto">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Income Statement ($K USD)</p>
          <table className="w-full text-xs font-condensed">
            <thead>
              <tr>
                <th className="text-left text-white-60 pb-1 font-normal">Línea</th>
                {YEARS.map(y => <th key={y} className="text-right text-white-60 pb-1 font-normal">{y}</th>)}
              </tr>
            </thead>
            <tbody>
              {[
                { key: 'revenue', label: 'Revenue', bold: false },
                { key: 'cogs', label: 'COGS', bold: false, neg: true },
                { key: 'grossProfit', label: 'Gross Profit', bold: true },
                { key: 'sga', label: 'SG&A', bold: false, neg: true },
                { key: 'ebitda', label: 'EBITDA', bold: true, highlight: true },
                { key: 'tax', label: 'Tax', bold: false, neg: true },
                { key: 'fcf', label: 'FCF', bold: true, color: true },
              ].map(row => (
                <tr key={row.key} className={row.highlight ? 'bg-gold-dim' : ''}>
                  <td className={`py-0.5 ${row.bold ? 'font-bold text-white' : 'text-white-60'}`}>
                    {row.label}
                  </td>
                  {YEARS.map(y => {
                    const v = fin[y]?.[row.key];
                    const cls = row.color ? (v >= 0 ? 'text-green-400' : 'text-red-400') : (row.highlight ? 'text-gold font-bold' : row.bold ? 'text-white font-bold' : 'text-white-60');
                    return (
                      <td key={y} className={`text-right py-0.5 ${cls}`}>
                        {v !== null && v !== undefined ? fmtK(v) : '—'}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* FCF chart */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">FCF & EBITDA ($K)</p>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={fcfData}>
              <CartesianGrid strokeDasharray="2 2" stroke="rgba(255,255,255,0.08)" />
              <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fill: MUTED, fontSize: 10, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} tickFormatter={v => `$${(v/1000).toFixed(0)}M`} />
              <Tooltip content={<CustomTooltip />} />
              <ReferenceLine y={0} stroke="rgba(255,255,255,0.3)" strokeDasharray="3 3" />
              <Bar dataKey="EBITDA" fill={GOLD} fillOpacity={0.3} />
              <Line dataKey="FCF" stroke={GOLD} dot={{ fill: GOLD, r: 3 }} strokeWidth={2} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>

        {/* DCF waterfall breakdown */}
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">EV Breakdown (Perpetuity)</p>
          <div className="space-y-2">
            {FORECAST_YEARS.map(y => {
              const pv = dcf.pvFCFs[y] || 0;
              const totalEV = dcf.evPerpetual;
              const pct = Math.abs(pv / totalEV);
              return (
                <div key={y} className="flex items-center gap-2">
                  <span className="text-xs font-condensed text-white-60 w-8">{y}</span>
                  <div className="flex-1 relative h-5 bg-white-5">
                    <div
                      className="absolute top-0 bottom-0"
                      style={{
                        width: `${Math.min(pct * 100, 100)}%`,
                        background: pv >= 0 ? 'rgba(247,175,28,0.4)' : 'rgba(239,68,68,0.4)',
                        left: pv >= 0 ? 0 : 'auto', right: pv < 0 ? 0 : 'auto'
                      }}
                    />
                    <span className="absolute inset-0 flex items-center px-1 text-xs font-condensed" style={{ color: pv >= 0 ? GOLD : RED }}>
                      ${pv >= 0 ? '' : '('}${Math.abs(pv / 1000).toFixed(0)}M{pv < 0 ? ')' : ''}
                    </span>
                  </div>
                </div>
              );
            })}
            <div className="flex items-center gap-2">
              <span className="text-xs font-condensed text-white-60 w-8">TV</span>
              <div className="flex-1 relative h-5 bg-white-5">
                <div className="absolute top-0 bottom-0 left-0 right-0" style={{ background: 'rgba(96,165,250,0.2)' }} />
                <span className="absolute inset-0 flex items-center px-1 text-xs font-condensed text-blue-400 font-bold">
                  ${(dcf.pvTerminal / 1000).toFixed(0)}M · {fmtPct(dcf.pvTerminal / dcf.evPerpetual)} of EV
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* WACC / TG sensitivity table */}
      <div className="border border-white-10 bg-white-5 p-4 overflow-x-auto">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">
          Sensitivity: Enterprise Value ($K) — filas = TG rate, columnas = WACC
        </p>
        <table className="text-xs font-condensed">
          <thead>
            <tr>
              <th className="text-right text-white-60 font-normal pr-3 pb-1">TG \ WACC</th>
              {waccRange.map(w => (
                <th key={w} className={`text-right px-3 pb-1 font-normal ${Math.abs(w - state.wacc) < 0.005 ? 'text-gold' : 'text-white-60'}`}>
                  {(w * 100).toFixed(0)}%
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sensitivityTable.map(({ tg, values }) => (
              <tr key={tg}>
                <td className={`text-right pr-3 py-0.5 ${Math.abs(tg - state.terminalGrowthRate) < 0.003 ? 'text-gold font-bold' : 'text-white-60'}`}>
                  {(tg * 100).toFixed(0)}%
                </td>
                {values.map((v, i) => {
                  const isCenter = Math.abs(waccRange[i] - state.wacc) < 0.005 && Math.abs(tg - state.terminalGrowthRate) < 0.003;
                  return (
                    <td key={i} className={`text-right px-3 py-0.5 ${isCenter ? 'bg-gold text-black font-bold' : ''}`}>
                      {v > 0 ? `$${(v / 1000).toFixed(0)}M` : `($${(Math.abs(v) / 1000).toFixed(0)}M)`}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE 1: MARKET TIMING
// ─────────────────────────────────────────────
// MODULE 1: PRODUCTO + MERCADO + TAM + PENETRACIÓN
// ─────────────────────────────────────────────
function Module1({ state, setState }) {
  const mult = state.scenarioMultipliers[state.scenario];
  const [selectedCode, setSelectedCode] = React.useState('');

  const addMarket = () => {
    if (!selectedCode || state.markets[selectedCode]) return;
    const c = COUNTRY_MAP[selectedCode];
    if (!c) return;
    setState(s => ({
      ...s,
      markets: {
        ...s.markets,
        [c.code]: {
          active: true, openYear: 2026, code: c.code, country: c.name, flag: c.flag, color: c.color,
          tamUnits: c.tamM * 1000000,
          penetration: [0, 0.10, 0.50, 1.50, 3.00, 6.00],
          priceUSD: c.price, cogsUSD: c.cogs,
        }
      }
    }));
    setSelectedCode('');
  };

  const removeMarket = (code) => {
    if (Object.keys(state.markets).length <= 1) return;
    setState(s => {
      const updated = { ...s.markets };
      delete updated[code];
      return { ...s, markets: updated };
    });
  };

  const setMkt = (key, field, val) => setState(s => ({
    ...s, markets: { ...s.markets, [key]: { ...s.markets[key], [field]: val } }
  }));
  const setPenet = (key, idx, val) => setState(s => {
    const arr = [...(s.markets[key].penetration || [])];
    arr[idx] = val;
    return { ...s, markets: { ...s.markets, [key]: { ...s.markets[key], penetration: arr } } };
  });

  // Revenue by market per year for chart
  const marketData = YEARS.map(y => {
    const yearIdx = y - 2025;
    const row = { year: y };
    for (const [key, mkt] of Object.entries(state.markets)) {
      if (mkt.active && y >= mkt.openYear) {
        const vol = calcMarketVolume(mkt, yearIdx, mult);
        row[mkt.country] = Math.round((vol / 1000) * mkt.priceUSD);
      } else {
        row[mkt.country] = 0;
      }
    }
    return row;
  });

  // Volume by market per year
  const volumeData = YEARS.map(y => {
    const yearIdx = y - 2025;
    const row = { year: y };
    for (const [key, mkt] of Object.entries(state.markets)) {
      row[mkt.country] = mkt.active && y >= mkt.openYear
        ? Math.round(calcMarketVolume(mkt, yearIdx, mult) / 1000000 * 10) / 10
        : 0;
    }
    return row;
  });

  return (
    <div className="p-4 space-y-6">

      {/* Product selector */}
      <div className="border border-white-10 bg-white-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Tipo de producto</p>
        <div className="flex gap-2 flex-wrap">
          {PRODUCT_TYPES.map(pt => (
            <button key={pt.id}
              onClick={() => setState(s => ({ ...s, productType: pt.id }))}
              className={`px-3 py-1.5 text-xs font-condensed font-bold tracking-wide ${state.productType === pt.id ? 'bg-gold text-black' : 'bg-white-10 text-white-60 hover:text-white'}`}>
              {pt.emoji} {pt.label}
            </button>
          ))}
          <input
            type="text"
            value={state.productName}
            onChange={e => setState(s => ({ ...s, productName: e.target.value }))}
            placeholder="Nombre del producto"
            className="bg-white-10 text-white px-2 py-1 text-xs font-condensed ml-2 w-36"
          />
        </div>
      </div>

      {/* Country selector */}
      <div className="border border-white-10 bg-white-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Mercados activos — agregá países</p>
        <div className="flex gap-2 items-center flex-wrap">
          <select
            value={selectedCode}
            onChange={e => setSelectedCode(e.target.value)}
            className="bg-black border border-white-20 text-white text-sm font-condensed px-3 py-2 min-w-48"
          >
            <option value="">— Seleccioná un país —</option>
            {COUNTRIES.filter(c => !state.markets[c.code]).map(c => (
              <option key={c.code} value={c.code}>{c.flag} {c.name}</option>
            ))}
          </select>
          <button
            onClick={addMarket}
            disabled={!selectedCode}
            className={`px-4 py-2 text-xs font-condensed font-bold tracking-wider ${selectedCode ? 'bg-gold text-black' : 'bg-white-10 text-white-20 cursor-not-allowed'}`}>
            + Agregar mercado
          </button>
          <span className="text-xs text-white-20 font-condensed ml-2">
            {Object.keys(state.markets).length} mercado{Object.keys(state.markets).length !== 1 ? 's' : ''} activo{Object.keys(state.markets).length !== 1 ? 's' : ''}
          </span>
        </div>
      </div>

      {/* Market cards with TAM + penetration + price/cogs */}
      <div className="space-y-4">
        {Object.entries(state.markets).map(([key, mkt]) => {
          const color = mkt.color || GOLD;
          const yearIdx2030 = 5;
          const vol2030 = calcMarketVolume(mkt, yearIdx2030, mult);
          const rev2030 = (vol2030 / 1000) * mkt.priceUSD;
          return (
            <div key={key} className="border bg-white-5" style={{ borderColor: mkt.active ? color + '66' : 'rgba(255,255,255,0.1)' }}>
              {/* Market header */}
              <div className="flex items-center justify-between px-4 py-3 border-b border-white-10">
                <div className="flex items-center gap-3">
                  <span className="text-2xl">{mkt.flag}</span>
                  <div>
                    <span className="font-condensed font-bold text-base" style={{ color }}>{mkt.country}</span>
                    {mkt.active && (
                      <span className="text-xs font-condensed text-white-60 ml-3">
                        Rev 2030: <span className="font-bold" style={{ color }}>{fmt(rev2030 * 1000)}</span>
                      </span>
                    )}
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs font-condensed text-white-60">Apertura:</span>
                  <input type="number" value={mkt.openYear} min={2025} max={2032}
                    onChange={e => setMkt(key, 'openYear', parseInt(e.target.value))}
                    className="bg-white-10 text-white text-center w-14 px-1 text-xs font-condensed" />
                  <button
                    onClick={() => setMkt(key, 'active', !mkt.active)}
                    className={`px-3 py-1 text-xs font-condensed font-bold ${mkt.active ? 'text-black' : 'bg-white-10 text-white-60'}`}
                    style={mkt.active ? { background: color } : {}}>
                    {mkt.active ? 'ON' : 'OFF'}
                  </button>
                  {Object.keys(state.markets).length > 1 && (
                    <button
                      onClick={() => removeMarket(key)}
                      className="px-2 py-1 text-xs font-condensed text-white-20 hover:text-red-400 border border-white-10 hover:border-red-400">
                      ×
                    </button>
                  )}
                </div>
              </div>

              {mkt.active && (
                <div className="p-4 space-y-4">
                  {/* Economic inputs: TAM, price, COGS */}
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <p className="text-xs font-condensed text-white-60 uppercase tracking-wider mb-1">TAM (millones de unidades/año)</p>
                      <div className="flex items-center gap-2">
                        <input type="number" value={Math.round(mkt.tamUnits / 1000000)}
                          min={1} max={50000}
                          onChange={e => setMkt(key, 'tamUnits', parseFloat(e.target.value) * 1000000)}
                          className="bg-black border border-white-20 text-gold text-right px-2 py-1 font-condensed font-bold text-lg w-28" />
                        <span className="text-xs text-white-60 font-condensed">M unidades</span>
                      </div>
                      <p className="text-xs text-white-20 font-condensed mt-1">
                        = {(mkt.tamUnits / 1000000000).toFixed(1)}B unidades
                      </p>
                    </div>
                    <div>
                      <p className="text-xs font-condensed text-white-60 uppercase tracking-wider mb-1">Precio de venta (USD/unidad)</p>
                      <div className="flex items-center gap-1">
                        <span className="text-white-60 font-condensed">$</span>
                        <input type="number" value={mkt.priceUSD} min={0.1} max={20} step={0.01}
                          onChange={e => setMkt(key, 'priceUSD', parseFloat(e.target.value))}
                          className="bg-black border border-white-20 text-gold text-right px-2 py-1 font-condensed font-bold text-lg w-24" />
                      </div>
                      <p className="text-xs font-condensed mt-1" style={{ color }}>
                        Margen bruto: {mkt.priceUSD > 0 ? ((1 - mkt.cogsUSD / mkt.priceUSD) * 100).toFixed(0) : 0}%
                      </p>
                    </div>
                    <div>
                      <p className="text-xs font-condensed text-white-60 uppercase tracking-wider mb-1">COGS (USD/unidad)</p>
                      <div className="flex items-center gap-1">
                        <span className="text-white-60 font-condensed">$</span>
                        <input type="number" value={mkt.cogsUSD} min={0.01} max={20} step={0.01}
                          onChange={e => setMkt(key, 'cogsUSD', parseFloat(e.target.value))}
                          className="bg-black border border-white-20 text-red-400 text-right px-2 py-1 font-condensed font-bold text-lg w-24" />
                      </div>
                      <p className="text-xs text-white-20 font-condensed mt-1">
                        Contrib: ${(mkt.priceUSD - mkt.cogsUSD).toFixed(2)}/u
                      </p>
                    </div>
                  </div>

                  {/* Penetration table */}
                  <div>
                    <p className="text-xs font-condensed text-white-60 uppercase tracking-wider mb-2">
                      Penetración de mercado (% del TAM) — editá año por año
                    </p>
                    <div className="overflow-x-auto">
                      <table className="w-full text-xs font-condensed">
                        <thead>
                          <tr>
                            <td className="text-white-40 pr-3 py-1">Año</td>
                            {YEARS.map(y => (
                              <td key={y} className={`text-center px-2 py-1 ${y < mkt.openYear ? 'text-white-20' : 'text-white-60'}`}>{y}</td>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          <tr>
                            <td className="text-white-40 pr-3 py-1">Penet. %</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className="px-1 py-1">
                                  <input
                                    type="number" value={pct} min={0} max={100} step={0.01}
                                    disabled={inactive}
                                    onChange={e => setPenet(key, i, parseFloat(e.target.value) || 0)}
                                    className={`text-center w-16 px-1 py-0.5 font-condensed font-bold text-sm ${
                                      inactive
                                        ? 'bg-transparent text-white-20 cursor-not-allowed'
                                        : 'bg-black border border-white-20 text-gold'
                                    }`}
                                  />
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-white-40 pr-3 py-1">Volumen</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const vol = mkt.tamUnits * Math.min((pct / 100) * mult, 0.99);
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className={`text-center px-2 py-1 ${inactive ? 'text-white-20' : 'text-white-60'}`}>
                                  {vol >= 1e6 ? `${(vol/1e6).toFixed(1)}M` : vol >= 1e3 ? `${(vol/1e3).toFixed(0)}K` : vol.toFixed(0)}
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-white-40 pr-3 py-1">Revenue</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const vol = mkt.tamUnits * Math.min((pct / 100) * mult, 0.99);
                              const rev = (vol / 1000) * mkt.priceUSD;
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className={`text-center px-2 py-1 font-bold ${inactive ? 'text-white-20' : 'text-white'}`}>
                                  {inactive ? '—' : fmt(rev * 1000)}
                                </td>
                              );
                            })}
                          </tr>
                          <tr>
                            <td className="text-white-40 pr-3 py-1">GP</td>
                            {YEARS.map((y, i) => {
                              const pct = mkt.penetration[i] || 0;
                              const vol = mkt.tamUnits * Math.min((pct / 100) * mult, 0.99);
                              const gp = (vol / 1000) * (mkt.priceUSD - mkt.cogsUSD);
                              const inactive = y < mkt.openYear;
                              return (
                                <td key={y} className={`text-center px-2 py-1 ${inactive ? 'text-white-20' : 'text-green-400'}`}>
                                  {inactive ? '—' : fmt(gp * 1000)}
                                </td>
                              );
                            })}
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Revenue by market stacked bar */}
      <div className="border border-white-10 bg-white-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Revenue total por mercado ($K USD)</p>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={marketData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(255,255,255,0.06)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => v >= 1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Barlow Condensed', color: MUTED }} />
            {Object.entries(state.markets).map(([key, mkt]) => (
              mkt.active && <Bar key={key} dataKey={mkt.country} stackId="a" fill={mkt.color || GOLD} />
            ))}
          </BarChart>
        </ResponsiveContainer>
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE 2: FINANCING
// ─────────────────────────────────────────────
function Module2({ state, setState }) {
  const fin = useMemo(() => buildFinancials(state), [state]);
  const dcf = useMemo(() => calcDCF(state), [state]);

  // Equity value trajectory
  const equityData = YEARS.map(y => {
    const annualEV = (() => {
      const s = { ...state };
      const revScale = fin[y]?.revenue / (fin[2030]?.revenue || 1);
      return dcf.evPerpetual * Math.pow(revScale, 0.5) * (fin[2030]?.revenue > 0 ? 1 : 0.1);
    })();
    const founderPct = 1 - state.equityDilution;
    return {
      year: y,
      'EV Total': Math.round(annualEV),
      'Founder Value': Math.round(annualEV * founderPct),
      'Investor Value': Math.round(annualEV * state.equityDilution),
    };
  });

  // Debt service schedule
  const debtData = FORECAST_YEARS.map(y => {
    const ds = calcDebtService(state, y);
    const ebitda = fin[y]?.ebitda || 0;
    const icr = ds > 0 ? ebitda / ds : null;
    return { year: y, 'Debt Service': Math.round(ds), EBITDA: Math.round(ebitda), ICR: icr };
  });

  const equityPath = state.financingMode === 'equity' || state.financingMode === 'mixed';
  const debtPath = state.financingMode === 'debt' || state.financingMode === 'mixed';

  // Cost comparison
  const dilutionCost = dcf.evPerpetual * state.equityDilution;
  const debtTotalCost = state.debtAmount * state.debtInterestRate * state.debtTermYears;

  return (
    <div className="p-4 space-y-6">
      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-white-60 uppercase tracking-widest mb-2">Conclusión: ¿deuda o equity?</p>
        <p className="text-base font-condensed font-bold text-gold">
          Deuda cuesta <span className="text-white">${(debtTotalCost/1000).toFixed(0)}K</span> total en intereses ·
          Dilución cuesta <span className="text-white">{fmtPct(state.equityDilution)}</span> de EV ({fmt(dilutionCost * 1000)})
        </p>
        <p className="text-sm font-condensed text-white-60 mt-1">
          {dilutionCost > debtTotalCost
            ? '→ Si confías en el modelo, la deuda preserva más upside para los founders.'
            : '→ La dilución es más barata que los intereses proyectados — considerá equity.'}
        </p>
      </div>

// MODULE 3: CHANNEL MARGIN
// ─────────────────────────────────────────────
function Module3({ state, setState }) {
  const channelMargins = useMemo(() => calcChannelMargins(state), [state]);
  const blended = useMemo(() => calcBlendedMargin(channelMargins), [channelMargins]);

  const [shiftFrom, setShiftFrom] = useState('wholesale');
  const [shiftTo, setShiftTo] = useState('rappi');
  const [shiftPct, setShiftPct] = useState(0.05);

  const shiftedChannels = useMemo(() => {
    const chs = { ...state.channels };
    const from = { ...chs[shiftFrom] };
    const to = { ...chs[shiftTo] };
    from.share = Math.max(0, from.share - shiftPct);
    to.share = Math.min(1, to.share + shiftPct);
    return { ...chs, [shiftFrom]: from, [shiftTo]: to };
  }, [state.channels, shiftFrom, shiftTo, shiftPct]);

  const shiftedMargins = useMemo(() => calcChannelMargins({ ...state, channels: shiftedChannels }), [state, shiftedChannels]);
  const shiftedBlended = useMemo(() => calcBlendedMargin(shiftedMargins), [shiftedMargins]);
  const marginDelta = shiftedBlended - blended;

  const chartData = Object.entries(channelMargins)
    .map(([key, ch]) => ({
      channel: ch.label || key,
      'Gross Margin %': Math.round(ch.grossMarginPct * 100 * 10) / 10,
      'Contrib/Unit ($)': Math.round(ch.contribPerUnit * 100) / 100,
      share: ch.share,
    }))
    .sort((a, b) => b['Gross Margin %'] - a['Gross Margin %']);

  const bestChannel = chartData[0];

  return (
    <div className="p-4 space-y-6">
      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-white-60 uppercase tracking-widest mb-1">Conclusión del canal</p>
        <p className="text-base font-condensed font-bold text-gold">
          Mejor margen: <span className="text-white">{bestChannel?.channel}</span> con{' '}
          <span className="text-white">{bestChannel?.['Gross Margin %'].toFixed(1)}%</span> de margen bruto.
          Blended actual: <span className="text-white">{fmtPct(blended)}</span>
        </p>
        <p className="text-sm font-condensed text-white-60 mt-1">
          {`Mover 10% de ${Object.values(channelMargins).sort((a,b) => a.grossMarginPct - b.grossMarginPct)[0]?.label} → ${bestChannel?.channel} agrega ~${fmtPct(Math.abs(chartData[0]?.['Gross Margin %']/100 - Object.values(channelMargins).sort((a,b) => a.grossMarginPct - b.grossMarginPct)[0]?.grossMarginPct) * 0.1)} al margen blended.`}
        </p>
      </div>

      {/* Editable channel table */}
      <div className="border border-white-10 bg-white-5 p-4 overflow-x-auto">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Canales — editá cualquier celda</p>
        <table className="w-full text-xs font-condensed">
          <thead>
            <tr>
              {['Canal', 'Share %', 'Precio/u', 'COGS/u', 'Fee dist.', 'Margen bruto', 'Contrib/u'].map(h => (
                <th key={h} className="text-right first:text-left text-white-60 font-normal pb-2 px-1">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {Object.entries(state.channels).map(([key, ch]) => {
              const cm = channelMargins[key];
              return (
                <tr key={key} className="border-t border-white-10">
                  <td className="py-1.5 px-1 font-bold text-white">{ch.label || key}</td>
                  <td className="text-right py-1.5 px-1">
                    <input type="number" step="0.01" min="0" max="1" value={ch.share}
                      onChange={e => setState(s => ({ ...s, channels: { ...s.channels, [key]: { ...s.channels[key], share: parseFloat(e.target.value) || 0 } } }))}
                      className="bg-white-10 text-white w-14 text-right px-1" />
                  </td>
                  <td className="text-right py-1.5 px-1">
                    <input type="number" step="0.01" min="0" value={ch.priceUSD}
                      onChange={e => setState(s => ({ ...s, channels: { ...s.channels, [key]: { ...s.channels[key], priceUSD: parseFloat(e.target.value) || 0 } } }))}
                      className="bg-white-10 text-white w-14 text-right px-1" />
                  </td>
                  <td className="text-right py-1.5 px-1">
                    <input type="number" step="0.01" min="0" value={ch.cogsUSD}
                      onChange={e => setState(s => ({ ...s, channels: { ...s.channels, [key]: { ...s.channels[key], cogsUSD: parseFloat(e.target.value) || 0 } } }))}
                      className="bg-white-10 text-white w-14 text-right px-1" />
                  </td>
                  <td className="text-right py-1.5 px-1">
                    <input type="number" step="0.01" min="0" max="0.99" value={ch.distribFee}
                      onChange={e => setState(s => ({ ...s, channels: { ...s.channels, [key]: { ...s.channels[key], distribFee: parseFloat(e.target.value) || 0 } } }))}
                      className="bg-white-10 text-white w-14 text-right px-1" />
                  </td>
                  <td className={`text-right py-1.5 px-1 font-bold ${cm.grossMarginPct > 0.3 ? 'text-green-400' : cm.grossMarginPct > 0.1 ? 'text-gold' : 'text-red-400'}`}>
                    {fmtPct(cm.grossMarginPct)}
                  </td>
                  <td className={`text-right py-1.5 px-1 ${cm.contribPerUnit > 0 ? 'text-green-400' : 'text-red-400'}`}>
                    ${cm.contribPerUnit.toFixed(3)}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div className="flex items-center justify-between mt-2 pt-2 border-t border-white-20">
          <span className="text-xs font-condensed text-white-60">Margen blended</span>
          <span className="text-xl font-condensed font-bold text-gold">{fmtPct(blended)}</span>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Margin chart */}
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Margen bruto por canal</p>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={chartData} layout="vertical">
              <CartesianGrid strokeDasharray="2 2" stroke="rgba(255,255,255,0.06)" horizontal={false} />
              <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} tickFormatter={v => `${v}%`} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="channel" tick={{ fill: '#fff', fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} width={80} />
              <Tooltip content={<CustomTooltip />} />
              <Bar dataKey="Gross Margin %" radius={0}>
                {chartData.map((entry, index) => (
                  <Cell key={index} fill={index === 0 ? GOLD : index === 1 ? BLUE : index === 2 ? GREEN : PURPLE} fillOpacity={0.7} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Shift simulator */}
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Simulador de mix — "peso marginal"</p>
          <div className="space-y-3 text-xs font-condensed">
            <div className="flex gap-2 items-center">
              <span className="text-white-60 w-12">From</span>
              <select value={shiftFrom} onChange={e => setShiftFrom(e.target.value)}
                className="bg-white-10 text-white px-2 py-1 flex-1">
                {Object.entries(state.channels).map(([k, ch]) => <option key={k} value={k}>{ch.label}</option>)}
              </select>
            </div>
            <div className="flex gap-2 items-center">
              <span className="text-white-60 w-12">To</span>
              <select value={shiftTo} onChange={e => setShiftTo(e.target.value)}
                className="bg-white-10 text-white px-2 py-1 flex-1">
                {Object.entries(state.channels).map(([k, ch]) => <option key={k} value={k}>{ch.label}</option>)}
              </select>
            </div>
            <Slider label="Share a mover" value={shiftPct} min={0.01} max={0.20} step={0.01}

            <div className="border border-white-20 p-3 mt-2">
              <div className="flex justify-between mb-1">
                <span className="text-white-60">Margen blended actual</span>
                <span className="text-white font-bold">{fmtPct(blended)}</span>
              </div>
              <div className="flex justify-between mb-1">
                <span className="text-white-60">Margen blended nuevo</span>
                <span className="text-white font-bold">{fmtPct(shiftedBlended)}</span>
              </div>
              <div className="flex justify-between border-t border-white-20 pt-1 mt-1">
                <span className="text-white-60">Delta</span>
                <span className={`font-bold text-lg ${marginDelta >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                  {marginDelta >= 0 ? '+' : ''}{fmtPct(marginDelta, 2)}

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Module4({ state, setState }) {
  const PRESETS = {
    estabilidad: { arInflation: 0.30, arFXDevaluation: 0.15, latamInflation: 0.05, usInflation: 0.025 },
    moderada:    { arInflation: 0.55, arFXDevaluation: 0.40, latamInflation: 0.10, usInflation: 0.04 },
    crisis:      { arInflation: 1.00, arFXDevaluation: 0.80, latamInflation: 0.20, usInflation: 0.06 },
  };

  const applyPreset = (preset) => setState(s => ({ ...s, ...PRESETS[preset] }));

  const macroData = YEARS.map(y => {
    const fxRate = state.arFX * Math.pow(1 + state.arFXDevaluation, y - 2025);
    const baseState = { ...state, arFXDevaluation: 0.15 };
    const crisisState = { ...state, arFXDevaluation: 0.80 };
    const baseRev = calcRevenue(baseState, y);
    const currentRev = calcRevenue(state, y);
    const crisisRev = calcRevenue(crisisState, y);
    const ebitda = calcEBITDA(state, y);
    const ebitdaMargin = currentRev > 0 ? ebitda / currentRev : 0;
    return {
      year: y,
      'Rev (Base FX)': Math.round(baseRev),
      'Rev (Current FX)': Math.round(currentRev),
      'Rev (Crisis FX)': Math.round(crisisRev),
      'EBITDA %': Math.round(ebitdaMargin * 100 * 10) / 10,
    };
  });

  const revenueImpact = (() => {
    const crisisState = { ...state, arFXDevaluation: 0.80 };
    const baseRev2030 = calcRevenue(state, 2030);
    const crisisRev2030 = calcRevenue(crisisState, 2030);
    return baseRev2030 - crisisRev2030;
  })();

  return (
    <div className="p-4 space-y-6">
      {/* Presets */}
      <div className="flex gap-3">
        {[
          { key: 'estabilidad', label: 'Estabilidad', desc: '30% inf · 15% dev' },
          { key: 'moderada', label: 'Dev. Moderada', desc: '55% inf · 40% dev' },
          { key: 'crisis', label: 'Crisis Cambiaria', desc: '100% inf · 80% dev' },
        ].map(({ key, label, desc }) => (
          <button key={key}
            onClick={() => applyPreset(key)}
            className="flex-1 border border-white-20 bg-white-5 p-3 text-left hover:border-gold-border transition-colors">
            <p className="font-condensed font-bold text-sm text-white">{label}</p>
            <p className="font-condensed text-xs text-white-60 mt-0.5">{desc}</p>
          </button>
        ))}
      </div>

      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-white-60 uppercase tracking-widest mb-1">Impacto de crisis cambiaria</p>
        <p className="text-base font-condensed font-bold text-gold">
          Bajo crisis (80% dev.), revenue 2030 cae{' '}
          <span className="text-red-400">${(revenueImpact / 1000).toFixed(0)}M</span> vs base.
          Necesitás ese monto en USD adicionales para mantener operaciones.
        </p>
      </div>

      {/* Sliders */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Variables macro Argentina</p>
          <Slider label="Inflación ARS anual" value={state.arInflation} min={0.10} max={2.00} step={0.01}
            onChange={v => setState(s => ({ ...s, arInflation: v }))} format={v => fmtPct(v)} />
          <Slider label="Devaluación ARS/USD anual" value={state.arFXDevaluation} min={0.05} max={1.50} step={0.01}
            onChange={v => setState(s => ({ ...s, arFXDevaluation: v }))} format={v => fmtPct(v)} />
          <Slider label="Tipo de cambio actual (ARS/USD)" value={state.arFX} min={500} max={5000} step={50}
            onChange={v => setState(s => ({ ...s, arFX: v }))} format={v => v.toLocaleString('en')} />
        </div>
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Variables macro globales</p>
          <Slider label="Inflación LATAM" value={state.latamInflation} min={0.03} max={0.30} step={0.005}

          <Slider label="Inflación USD" value={state.usInflation} min={0.01} max={0.15} step={0.005}

// MODULE 6: CAJA — ¿Me alcanza la plata?
// ─────────────────────────────────────────────
function Module6({ state, setState }) {
  const fin = useMemo(() => buildFinancials(state), [state]);

  // Working capital breakdown per year
  const wcData = YEARS.map(y => {
    const rev = fin[y]?.revenue || 0;
    const cogs = fin[y]?.cogs || 0;
    const ar   = (rev  / 365) * state.daysAR;
    const inv  = (cogs / 365) * state.daysInventory;
    const ap   = (cogs / 365) * state.daysAP;
    const nwc  = ar + inv - ap;
    const deltaWC = y > 2025 ? nwc - ((fin[y-1]?.revenue||0)/365*state.daysAR + (fin[y-1]?.cogs||0)/365*state.daysInventory - (fin[y-1]?.cogs||0)/365*state.daysAP) : 0;
    return { year: y, 'Cuentas a Cobrar': Math.round(ar), 'Inventario': Math.round(inv), 'Cuentas a Pagar': -Math.round(ap), 'WC Neto': Math.round(nwc), deltaWC: Math.round(deltaWC) };
  });

  // Cumulative FCF (cash position)
  let cumFCF = 0;
  const cashData = YEARS.map(y => {
    const fcf = fin[y]?.fcf || 0;
    cumFCF += fcf;
    return { year: y, 'FCF Anual': Math.round(fcf), 'Caja Acumulada': Math.round(cumFCF) };
  });

  // Peak cash need = worst cumulative FCF
  const peakNeed = Math.min(...cashData.map(d => d['Caja Acumulada']));
  const needYear = cashData.find(d => d['Caja Acumulada'] === peakNeed)?.year;
  const breakEvenYear = cashData.find(d => d['Caja Acumulada'] >= 0 && d.year > 2025)?.year;

  // Cash conversion cycle
  const ccc = state.daysAR + state.daysInventory - state.daysAP;

  // Debt service coverage
  const debtService2027 = calcDebtService(state, 2027);
  const ebitda2027 = fin[2027]?.ebitda || 0;
  const dscr = debtService2027 > 0 ? ebitda2027 / debtService2027 : null;

  // How much capital is needed?
  const capitalGap = peakNeed < 0 ? Math.abs(peakNeed) * 1.2 : 0; // 20% buffer
  const canRepayDebt = dscr !== null ? dscr >= 1.2 : true;

  // Sensitivity: how DSO/DIO/DPO affect peak cash need
  const sensitDSO = [15, 30, 45, 60, 90].map(dso => {
    let cum = 0;
    YEARS.forEach(y => {
      const rev = fin[y]?.revenue || 0; const cogs = fin[y]?.cogs || 0;
      const ebitda = fin[y]?.ebitda || 0; const capex = fin[y]?.capex || 0;
      const ar = (rev/365)*dso; const inv = (cogs/365)*state.daysInventory; const ap = (cogs/365)*state.daysAP;
      const nwc = ar + inv - ap;
      const prevRev = y > 2025 ? (fin[y-1]?.revenue||0) : 0; const prevCogs = y > 2025 ? (fin[y-1]?.cogs||0) : 0;
      const prevAR = (prevRev/365)*dso; const prevInv = (prevCogs/365)*state.daysInventory; const prevAP = (prevCogs/365)*state.daysAP;
      const dWC = y > 2025 ? (nwc - (prevAR+prevInv-prevAP)) : 0;
      cum += y > 2025 ? ebitda - (fin[y]?.tax||0) - capex - dWC : 0;
    });
    return { dso, peakCash: Math.round(cum) };
  });

  const sensitDPO = [15, 30, 45, 60, 90].map(dpo => {
    let cum = 0;
    YEARS.forEach(y => {
      const rev = fin[y]?.revenue || 0; const cogs = fin[y]?.cogs || 0;
      const ebitda = fin[y]?.ebitda || 0; const capex = fin[y]?.capex || 0;
      const ar = (rev/365)*state.daysAR; const inv = (cogs/365)*state.daysInventory; const ap = (cogs/365)*dpo;
      const nwc = ar + inv - ap;
      const prevRev = y > 2025 ? (fin[y-1]?.revenue||0) : 0; const prevCogs = y > 2025 ? (fin[y-1]?.cogs||0) : 0;
      const prevAR = (prevRev/365)*state.daysAR; const prevInv = (prevCogs/365)*state.daysInventory; const prevAP = (prevCogs/365)*dpo;
      const dWC = y > 2025 ? (nwc - (prevAR+prevInv-prevAP)) : 0;
      cum += y > 2025 ? ebitda - (fin[y]?.tax||0) - capex - dWC : 0;
    });
    return { dpo, peakCash: Math.round(cum) };
  });

  return (
    <div className="p-4 space-y-6">

      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-white-60 uppercase tracking-widest mb-2">¿Me alcanza la caja?</p>
        <div className="flex gap-8 flex-wrap items-end">
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">Capital necesario</p>
            <p className={`text-4xl font-condensed font-bold ${capitalGap > 0 ? 'text-red-400' : 'text-green-400'}`}>
              {capitalGap > 0 ? fmt(capitalGap * 1000) : 'Autosuficiente'}
            </p>
            {capitalGap > 0 && <p className="text-xs text-white-60 font-condensed mt-1">Pico de necesidad en {needYear} (con 20% buffer)</p>}
          </div>
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">Break-even caja</p>
            <p className="text-4xl font-condensed font-bold text-white">{breakEvenYear || '> 2030'}</p>
          </div>
          <div>
            <p className="text-xs text-white-60 font-condensed uppercase">Ciclo de caja (días)</p>
            <p className={`text-4xl font-condensed font-bold ${ccc > 40 ? 'text-red-400' : ccc > 20 ? 'text-gold' : 'text-green-400'}`}>{ccc}d</p>
            <p className="text-xs text-white-60 font-condensed">DSO + DIO − DPO</p>
          </div>
          {dscr !== null && (
            <div>
              <p className="text-xs text-white-60 font-condensed uppercase">DSCR 2027</p>
              <p className={`text-4xl font-condensed font-bold ${canRepayDebt ? 'text-green-400' : 'text-red-400'}`}>{dscr.toFixed(1)}x</p>
              <p className="text-xs text-white-60 font-condensed">{canRepayDebt ? 'Podés pagar la deuda' : '⚠ Insuficiente para servicio'}</p>
            </div>
          )}
        </div>
      </div>

      {/* The three levers */}
      <div className="border border-white-10 bg-white-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-4 tracking-wider">Las 3 palancas de caja — tocá y ves el impacto instantáneo</p>
        <div className="grid grid-cols-3 gap-6">
          <div>
            <div className="text-center mb-3">
              <p className="text-xs font-condensed text-white-60 uppercase">DSO — Días a Cobrar</p>
              <p className={`text-5xl font-condensed font-black ${state.daysAR > 45 ? 'text-red-400' : state.daysAR > 30 ? 'text-gold' : 'text-green-400'}`}>{state.daysAR}d</p>
              <p className="text-xs text-white-60 font-condensed">Cuentas a cobrar</p>
            </div>
            <input type="range" min={7} max={120} step={1} value={state.daysAR}
              onChange={e => setState(s => ({ ...s, daysAR: parseInt(e.target.value) }))}
              className="w-full" />
            <div className="flex justify-between text-xs text-white-20 font-condensed mt-1">
              <span>7d (contado)</span><span>120d (crédito extendido)</span>
            </div>
          </div>
          <div>
            <div className="text-center mb-3">
              <p className="text-xs font-condensed text-white-60 uppercase">DIO — Días de Inventario</p>
              <p className={`text-5xl font-condensed font-black ${state.daysInventory > 30 ? 'text-red-400' : state.daysInventory > 15 ? 'text-gold' : 'text-green-400'}`}>{state.daysInventory}d</p>
              <p className="text-xs text-white-60 font-condensed">Stock en depósito</p>
            </div>
            <input type="range" min={5} max={90} step={1} value={state.daysInventory}
              onChange={e => setState(s => ({ ...s, daysInventory: parseInt(e.target.value) }))}
              className="w-full" />
            <div className="flex justify-between text-xs text-white-20 font-condensed mt-1">
              <span>5d (just-in-time)</span><span>90d (buffer alto)</span>
            </div>
          </div>
          <div>
            <div className="text-center mb-3">
              <p className="text-xs font-condensed text-white-60 uppercase">DPO — Días a Pagar</p>
              <p className={`text-5xl font-condensed font-black ${state.daysAP < 20 ? 'text-red-400' : state.daysAP < 45 ? 'text-gold' : 'text-green-400'}`}>{state.daysAP}d</p>
              <p className="text-xs text-white-60 font-condensed">Crédito de proveedor</p>
            </div>
            <input type="range" min={0} max={120} step={1} value={state.daysAP}
              onChange={e => setState(s => ({ ...s, daysAP: parseInt(e.target.value) }))}
              className="w-full" />
            <div className="flex justify-between text-xs text-white-20 font-condensed mt-1">
              <span>0d (pago anticipado)</span><span>120d (crédito máximo)</span>
            </div>
          </div>
        </div>
      </div>

      {/* Cumulative cash position */}
      <div className="border border-white-10 bg-white-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Posición de caja acumulada ($K USD)</p>
        <ResponsiveContainer width="100%" height={220}>
          <ComposedChart data={cashData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(255,255,255,0.06)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => v >= 1000 || v <= -1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Barlow Condensed', color: MUTED }} />
            <ReferenceLine y={0} stroke={RED} strokeDasharray="4 2" strokeWidth={1.5} />
            <Bar dataKey="FCF Anual" fill={BLUE} fillOpacity={0.6} />
            <Line dataKey="Caja Acumulada" stroke={GOLD} strokeWidth={2.5} dot={{ fill: GOLD, r: 4 }} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>

      {/* Working capital breakdown */}
      <div className="border border-white-10 bg-white-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Capital de trabajo — AR / Inventario / AP ($K USD)</p>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={wcData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(255,255,255,0.06)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => v >= 1000 || v <= -1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Barlow Condensed', color: MUTED }} />
            <ReferenceLine y={0} stroke="rgba(255,255,255,0.2)" />
            <Bar dataKey="Cuentas a Cobrar" stackId="wc" fill={BLUE} />
            <Bar dataKey="Inventario" stackId="wc" fill={PURPLE} />
            <Bar dataKey="Cuentas a Pagar" stackId="wc" fill={GREEN} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Sensitivity: DSO vs DPO impact on cash */}
      <div className="grid grid-cols-2 gap-4">
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Sensibilidad DSO → Caja acumulada 2030 ($K)</p>
          <table className="w-full text-xs font-condensed">
            <thead><tr>
              <th className="text-left text-white-40 pb-2">DSO</th>
              <th className="text-right text-white-40 pb-2">Caja 2030</th>
              <th className="text-right text-white-40 pb-2">vs actual</th>
            </tr></thead>
            <tbody>
              {sensitDSO.map(row => {
                const base = sensitDSO.find(r => r.dso === 45)?.peakCash || 0;
                const delta = row.peakCash - base;
                return (
                  <tr key={row.dso} className={row.dso === state.daysAR ? 'bg-gold-dim' : ''}>
                    <td className={`py-1 ${row.dso === state.daysAR ? 'text-gold font-bold' : 'text-white-60'}`}>{row.dso}d</td>
                    <td className={`text-right ${row.peakCash >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmt(row.peakCash * 1000)}</td>
                    <td className={`text-right ${delta >= 0 ? 'text-green-400' : 'text-red-400'}`}>{delta >= 0 ? '+' : ''}{fmt(delta * 1000)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="border border-white-10 bg-white-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Sensibilidad DPO → Caja acumulada 2030 ($K)</p>
          <table className="w-full text-xs font-condensed">
            <thead><tr>
              <th className="text-left text-white-40 pb-2">DPO</th>
              <th className="text-right text-white-40 pb-2">Caja 2030</th>
              <th className="text-right text-white-40 pb-2">vs actual</th>
            </tr></thead>
            <tbody>
              {sensitDPO.map(row => {
                const base = sensitDPO.find(r => r.dpo === 30)?.peakCash || 0;
                const delta = row.peakCash - base;
                return (
                  <tr key={row.dpo} className={row.dpo === state.daysAP ? 'bg-gold-dim' : ''}>
                    <td className={`py-1 ${row.dpo === state.daysAP ? 'text-gold font-bold' : 'text-white-60'}`}>{row.dpo}d</td>
                    <td className={`text-right ${row.peakCash >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmt(row.peakCash * 1000)}</td>
                    <td className={`text-right ${delta >= 0 ? 'text-green-400' : 'text-red-400'}`}>{delta >= 0 ? '+' : ''}{fmt(delta * 1000)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
const TABS = [
  { id: 'markets',   label: '01 — Producto & Mercado', question: '¿Qué vendo, a quién y a qué precio?' },
  { id: 'caja',      label: '02 — Caja',               question: '¿Me alcanza la plata? ¿Cuánto capital necesito?' },
  { id: 'financing', label: '03 — Financiamiento',     question: '¿Deuda o equity — y qué me cuesta?' },
  { id: 'channels',  label: '04 — Canales',            question: '¿Dónde meto el próximo peso?' },
  { id: 'macro',     label: '05 — Macro',              question: '¿Cómo me afecta la macro?' },
  { id: 'dcf',       label: '06 — Valuación',          question: '¿Cuánto vale (Sh!) hoy?' },
];

function App() {
  const [state, setState] = useState(INITIAL_STATE);
  const [activeTab, setActiveTab] = useState('dcf');

  const activeTabData = TABS.find(t => t.id === activeTab);

  return (
    <div className="min-h-screen bg-black text-white" style={{ fontFamily: 'Barlow, sans-serif' }}>
      {/* Header */}
      <div className="border-b border-white-10 px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <span className="text-2xl font-condensed font-black tracking-tight text-gold">(Sh!)</span>
          <span className="text-xs font-condensed text-white-60 uppercase tracking-widest">Strategic Decision Tool — Founders Only</span>
        </div>
        <span className="text-xs font-condensed text-white-20 uppercase tracking-widest hidden md:block">CONFIDENCIAL · DO NOT DISTRIBUTE</span>
      </div>

      {/* Global Controls */}
      <GlobalControls state={state} setState={setState} />

      {/* Tabs */}
      <div className="flex border-b border-white-10 overflow-x-auto">
        {TABS.map(tab => (
          <button key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            className={`px-4 py-3 text-xs font-condensed font-bold uppercase tracking-wider whitespace-nowrap ${activeTab === tab.id ? 'tab-active' : 'text-white-60 hover:text-white'}`}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Active question */}
      <div className="px-4 py-2 bg-white-5 border-b border-white-10">
        <p className="text-xs font-condensed text-white-60 uppercase tracking-wider">
          Pregunta: <span className="text-white">{activeTabData?.question}</span>
        </p>
      </div>

      {/* Module content */}
      <div className="overflow-y-auto" style={{ maxHeight: 'calc(100vh - 130px)' }}>
        {activeTab === 'markets'   && <Module1 state={state} setState={setState} />}
        {activeTab === 'caja'      && <Module6 state={state} setState={setState} />}
        {activeTab === 'financing' && <Module2 state={state} setState={setState} />}
        {activeTab === 'channels'  && <Module3 state={state} setState={setState} />}
        {activeTab === 'macro'     && <Module4 state={state} setState={setState} />}
        {activeTab === 'dcf'       && <Module5 state={state} setState={setState} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
