// ─────────────────────────────────────────────
// MODULE 6: CAJA — ¿Me alcanza la plata?
// ─────────────────────────────────────────────
function Module6({ state, setState }) {
  const fin = useMemo(() => buildFinancials(state), [state]);

  // Working capital breakdown per year
  const wcData = YEARS.map(y => {
    const rev = fin[y]?.revenue || 0;
    const cogs = fin[y]?.cogs || 0;
    const ar   = (rev  / 365) * state.daysAR;
    const inv  = (cogs / 365) * state.daysInventory;
    const ap   = (cogs / 365) * state.daysAP;
    const nwc  = ar + inv - ap;
    const deltaWC = y > 2025 ? nwc - ((fin[y-1]?.revenue||0)/365*state.daysAR + (fin[y-1]?.cogs||0)/365*state.daysInventory - (fin[y-1]?.cogs||0)/365*state.daysAP) : 0;
    return { year: y, 'Cuentas a Cobrar': Math.round(ar), 'Inventario': Math.round(inv), 'Cuentas a Pagar': -Math.round(ap), 'WC Neto': Math.round(nwc), deltaWC: Math.round(deltaWC) };
  });

  // Cumulative FCF — starts from actual 2025 ending cash (EECC auditados)
  let cumFCF = ACTUALS_2025.cash; // $16.7K USD real al 31/12/2025
  const cashData = YEARS.map(y => {
    const fcf = fin[y]?.fcf ?? 0;
    if (y > 2025) cumFCF += fcf;
    return {
      year: y,
      'FCF Anual': y === 2025 ? 0 : Math.round(fcf),
      'Caja Acumulada': Math.round(cumFCF),
    };
  });

  // Peak cash need = worst cumulative FCF
  const peakNeed = Math.min(...cashData.map(d => d['Caja Acumulada']));
  const needYear = cashData.find(d => d['Caja Acumulada'] === peakNeed)?.year;
  const breakEvenYear = cashData.find(d => d['Caja Acumulada'] >= 0 && d.year > 2025)?.year;

  // Cash conversion cycle
  const ccc = state.daysAR + state.daysInventory - state.daysAP;

  // Debt service coverage
  const debtService2027 = calcDebtService(state, 2027);
  const ebitda2027 = fin[2027]?.ebitda || 0;
  const dscr = debtService2027 > 0 ? ebitda2027 / debtService2027 : null;

  // How much capital is needed?
  const capitalGap = peakNeed < 0 ? Math.abs(peakNeed) * 1.2 : 0; // 20% buffer
  const canRepayDebt = dscr !== null ? dscr >= 1.2 : true;

  // Sensitivity: how DSO/DIO/DPO affect peak cash need
  const sensitDSO = [15, 30, 45, 60, 90].map(dso => {
    let cum = 0;
    YEARS.forEach(y => {
      const rev = fin[y]?.revenue || 0; const cogs = fin[y]?.cogs || 0;
      const ebitda = fin[y]?.ebitda || 0; const capex = fin[y]?.capex || 0;
      const ar = (rev/365)*dso; const inv = (cogs/365)*state.daysInventory; const ap = (cogs/365)*state.daysAP;
      const nwc = ar + inv - ap;
      const prevRev = y > 2025 ? (fin[y-1]?.revenue||0) : 0; const prevCogs = y > 2025 ? (fin[y-1]?.cogs||0) : 0;
      const prevAR = (prevRev/365)*dso; const prevInv = (prevCogs/365)*state.daysInventory; const prevAP = (prevCogs/365)*state.daysAP;
      const dWC = y > 2025 ? (nwc - (prevAR+prevInv-prevAP)) : 0;
      cum += y > 2025 ? ebitda - (fin[y]?.tax||0) - capex - dWC : 0;
    });
    return { dso, peakCash: Math.round(cum) };
  });

  const sensitDPO = [15, 30, 45, 60, 90].map(dpo => {
    let cum = 0;
    YEARS.forEach(y => {
      const rev = fin[y]?.revenue || 0; const cogs = fin[y]?.cogs || 0;
      const ebitda = fin[y]?.ebitda || 0; const capex = fin[y]?.capex || 0;
      const ar = (rev/365)*state.daysAR; const inv = (cogs/365)*state.daysInventory; const ap = (cogs/365)*dpo;
      const nwc = ar + inv - ap;
      const prevRev = y > 2025 ? (fin[y-1]?.revenue||0) : 0; const prevCogs = y > 2025 ? (fin[y-1]?.cogs||0) : 0;
      const prevAR = (prevRev/365)*state.daysAR; const prevInv = (prevCogs/365)*state.daysInventory; const prevAP = (prevCogs/365)*dpo;
      const dWC = y > 2025 ? (nwc - (prevAR+prevInv-prevAP)) : 0;
      cum += y > 2025 ? ebitda - (fin[y]?.tax||0) - capex - dWC : 0;
    });
    return { dpo, peakCash: Math.round(cum) };
  });

  return (
    <div className="p-4 space-y-6">

      {/* Key output */}
      <div className="border border-gold-border bg-gold-dim p-4">
        <p className="text-xs font-condensed text-ink-60 uppercase tracking-widest mb-2">¿Me alcanza la caja?</p>
        <div className="flex gap-8 flex-wrap items-end">
          <div>
            <p className="text-xs text-ink-60 font-condensed uppercase">Capital necesario</p>
            <p className={`text-4xl font-condensed font-bold ${capitalGap > 0 ? 'text-red-600' : 'text-emerald-700'}`}>
              {capitalGap > 0 ? fmt(capitalGap * 1000) : 'Autosuficiente'}
            </p>
            {capitalGap > 0 && <p className="text-xs text-ink-60 font-condensed mt-1">Pico de necesidad en {needYear} (con 20% buffer)</p>}
            {capitalGap > 0 && (
              <div className="mt-3 pt-3 border-t border-ink-20 text-xs font-condensed space-y-1.5 max-w-xs">
                <p className="text-ink-40 uppercase tracking-wider font-semibold">¿Cómo se calcula?</p>
                <p className="text-ink-60">Es el peor acumulado de FCF libre proyectado ({needYear}) más 20% de colchón operativo. Si los flujos son negativos antes del break-even, ese es el agujero que necesitás cubrir.</p>
                <p className="text-ink-40 uppercase tracking-wider font-semibold mt-2">Alternativas para financiar ese descalce</p>
                <p className="text-ink-60">① <strong className="text-ink">Equity</strong> — emitís acciones, el capital entra sin costo de interés pero diluís. Usá el tab Financiamiento para modelarlo.</p>
                <p className="text-ink-60">② <strong className="text-ink">Deuda</strong> — préstamo bancario o venture debt. Pagás tasa pero no diluís. Funciona si DSCR ≥ 1.2x.</p>
                <p className="text-ink-60">③ <strong className="text-ink">Working capital</strong> — bajá DSO, subí DPO. Cada día menos de ciclo reduce la necesidad. Tocá los sliders de abajo para ver el impacto.</p>
              </div>
            )}
          </div>
          <div>
            <p className="text-xs text-ink-60 font-condensed uppercase">Break-even caja</p>
            <p className="text-4xl font-condensed font-bold text-ink">{breakEvenYear || '> 2030'}</p>
          </div>
          <div>
            <p className="text-xs text-ink-60 font-condensed uppercase">Ciclo de caja (días)</p>
            <p className={`text-4xl font-condensed font-bold ${ccc > 40 ? 'text-red-600' : ccc > 20 ? 'text-gold' : 'text-emerald-700'}`}>{ccc}d</p>
            <p className="text-xs text-ink-60 font-condensed">DSO + DIO − DPO</p>
          </div>
          {dscr !== null && (
            <div>
              <p className="text-xs text-ink-60 font-condensed uppercase">DSCR 2027</p>
              <p className={`text-4xl font-condensed font-bold ${canRepayDebt ? 'text-emerald-700' : 'text-red-600'}`}>{dscr.toFixed(1)}x</p>
              <p className="text-xs text-ink-60 font-condensed">{canRepayDebt ? 'Podés pagar la deuda' : '⚠ Insuficiente para servicio'}</p>
            </div>
          )}
        </div>
      </div>

      {/* Decomposición de por qué necesito capital */}
      {(() => {
        const ebitdaBurn = FORECAST_YEARS.reduce((s,y) => s + Math.min(0, fin[y]?.ebitda||0), 0);
        const wcGrowth   = FORECAST_YEARS.reduce((s,y) => s + Math.max(0, fin[y]?.deltaWC||0), 0);
        const totalNeed  = capitalGap;
        return (
          <div className="border border-gold/40 bg-gold/5 p-4">
            <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider font-bold">¿Por qué necesito capital? — Las 2 causas</p>
            <div className="grid grid-cols-3 gap-4 mb-4">
              {/* Causa 1 */}
              <div className="bg-white border border-ash p-3">
                <p className="text-[10px] font-condensed uppercase text-ink-40 tracking-wider mb-1">① Pérdida operativa</p>
                <p className="text-2xl font-condensed font-bold text-red-600">({fmt(Math.abs(ebitdaBurn)*1000)})</p>
                <p className="text-[10px] font-condensed text-ink-40 mt-1">Suma de EBITDA negativo 2026–2030. El negocio todavía invierte más de lo que gana.</p>
                <div className="mt-2 pt-2 border-t border-ash">
                  <p className="text-[10px] font-condensed text-ink-60">💡 Palanca: subir precio o bajar OpEx</p>
                </div>
              </div>
              {/* Causa 2 */}
              <div className="bg-white border border-ash p-3">
                <p className="text-[10px] font-condensed uppercase text-ink-40 tracking-wider mb-1">② Inversión en capital de trabajo</p>
                <p className="text-2xl font-condensed font-bold text-red-600">({fmt(wcGrowth*1000)})</p>
                <p className="text-[10px] font-condensed text-ink-40 mt-1">
                  Plata inmovilizada en stock + crédito a clientes cada año que crece el volumen.
                  Ciclo actual: <strong className="text-ink">{ccc} días</strong> (DSO {state.daysAR} + DIO {state.daysInventory} − DPO {state.daysAP}).
                </p>
                <div className="mt-2 pt-2 border-t border-ash">
                  <p className="text-[10px] font-condensed text-ink-60">💡 Palanca: bajar DIO (stock), subir DPO (pagar después)</p>
                </div>
              </div>
              {/* Total con buffer */}
              <div className="bg-white border border-gold p-3">
                <p className="text-[10px] font-condensed uppercase text-gold tracking-wider mb-1">Capital total necesario (con buffer)</p>
                <p className={`text-2xl font-condensed font-bold ${totalNeed > 0 ? 'text-red-600' : 'text-emerald-700'}`}>
                  {totalNeed > 0 ? `(${fmt(totalNeed*1000)})` : fmt(totalNeed*1000)}
                </p>
                <p className="text-[10px] font-condensed text-ink-40 mt-1">
                  Piso de caja acumulada × 1.2 de buffer. Año crítico: {needYear}.
                </p>
                <div className="mt-2 pt-2 border-t border-ash text-[10px] font-condensed text-ink-40 space-y-0.5">
                  <p>Burn op.: {fmt(Math.abs(ebitdaBurn)*1000)}</p>
                  <p>WC growth: {fmt(wcGrowth*1000)}</p>
                </div>
              </div>
            </div>
            {/* Sensitivity levers — quick impact table */}
            <div className="bg-white border border-ash p-3">
              <p className="text-[10px] font-condensed uppercase text-ink-60 tracking-wider mb-2">¿Qué palanca reduce más la necesidad?</p>
              <div className="grid grid-cols-3 gap-3 text-[10px] font-condensed">
                {[
                  { label: 'Bajar DIO de '+state.daysInventory+'d → 60d', impact: (() => { const saved = (state.daysInventory > 60) ? FORECAST_YEARS.reduce((s,y) => { const cogs = fin[y]?.cogs||0; return s + (cogs/365)*(state.daysInventory-60); }, 0) : 0; return Math.round(saved); })() },
                  { label: 'Subir DPO de '+state.daysAP+'d → 60d',       impact: (() => { const saved = (state.daysAP < 60) ? FORECAST_YEARS.reduce((s,y) => { const cogs = fin[y]?.cogs||0; return s + (cogs/365)*(60-state.daysAP); }, 0) : 0; return Math.round(saved); })() },
                  { label: 'Bajar DSO de '+state.daysAR+'d → 20d',       impact: (() => { const saved = (state.daysAR > 20) ? FORECAST_YEARS.reduce((s,y) => { const rev = fin[y]?.revenue||0; return s + (rev/365)*(state.daysAR-20); }, 0) : 0; return Math.round(saved); })() },
                ].map(({ label, impact }) => (
                  <div key={label} className={`p-2 border ${impact > 0 ? 'border-emerald-300 bg-emerald-50' : 'border-ash bg-ink-5'}`}>
                    <p className="text-ink-60 mb-1">{label}</p>
                    <p className={`text-base font-bold ${impact > 0 ? 'text-emerald-700' : 'text-ink-40'}`}>
                      {impact > 0 ? `+${fmt(impact*1000)}` : 'Ya optimizado'}
                    </p>
                    <p className="text-ink-30">{impact > 0 ? 'menos capital necesario' : ''}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ¿Por qué tanto capital? — Waterfall de FCF */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-1 tracking-wider">Waterfall de FCF — año por año</p>
        <p className="text-xs font-condensed text-ink-40 mb-4">
          Cada año que crece el revenue, necesitás poner más plata en inventario y en crédito a clientes.
          Eso es el ΔCapital de Trabajo: plata real que sale de caja antes de que entre un peso de ganancia.
        </p>
        <div className="overflow-x-auto">
          <table className="w-full text-xs font-condensed">
            <thead>
              <tr className="border-b border-ash">
                <th className="text-left text-ink-40 py-2 pr-4 font-normal w-52">Driver de caja</th>
                {FORECAST_YEARS.map(y => (
                  <th key={y} className="text-right text-ink-40 py-2 px-2 font-normal">{y}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              <tr className="border-b border-ash">
                <td className="py-1.5 pr-4 text-ink-60">EBITDA operativo</td>
                {FORECAST_YEARS.map(y => {
                  const v = fin[y]?.ebitda || 0;
                  return (
                    <td key={y} className={`text-right px-2 py-1.5 ${v >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                      {v < 0 ? `(${fmt(Math.abs(v)*1000)})` : fmt(v*1000)}
                    </td>
                  );
                })}
              </tr>
              <tr className="border-b border-ash">
                <td className="py-1.5 pr-4 text-ink-60">
                  ΔCapital de trabajo
                  <span className="block text-ink-30 text-[10px]">AR + Inventario − Proveedores</span>
                </td>
                {FORECAST_YEARS.map(y => {
                  const dWC = fin[y]?.deltaWC || 0;
                  return (
                    <td key={y} className={`text-right px-2 py-1.5 ${dWC > 0 ? 'text-red-600' : 'text-emerald-700'}`}>
                      {dWC > 0 ? `(${fmt(dWC*1000)})` : dWC < 0 ? `+${fmt(Math.abs(dWC)*1000)}` : '—'}
                    </td>
                  );
                })}
              </tr>
              <tr className="border-b border-ash">
                <td className="py-1.5 pr-4 text-ink-60">Capex</td>
                {FORECAST_YEARS.map(y => {
                  const c = fin[y]?.capex || 0;
                  return (
                    <td key={y} className={`text-right px-2 py-1.5 ${c > 0 ? 'text-red-600' : 'text-ink-30'}`}>
                      {c > 0 ? `(${fmt(c*1000)})` : '—'}
                    </td>
                  );
                })}
              </tr>
              <tr className="border-t-2 border-ink-20 bg-white">
                <td className="py-2 pr-4 font-bold text-ink">= FCF del año</td>
                {FORECAST_YEARS.map(y => {
                  const v = fin[y]?.fcf ?? 0;
                  return (
                    <td key={y} className={`text-right px-2 py-2 font-bold ${v >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                      {v < 0 ? `(${fmt(Math.abs(v)*1000)})` : fmt(v*1000)}
                    </td>
                  );
                })}
              </tr>
              <tr className="bg-gold-dim">
                <td className="py-2 pr-4 font-bold text-gold">Caja acumulada</td>
                {FORECAST_YEARS.map(y => {
                  const v = cashData.find(d => d.year === y)?.['Caja Acumulada'] ?? 0;
                  return (
                    <td key={y} className={`text-right px-2 py-2 font-bold ${v >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                      {v < 0 ? `(${fmt(Math.abs(v)*1000)})` : fmt(v*1000)}
                    </td>
                  );
                })}
              </tr>
            </tbody>
          </table>
        </div>
        {/* Capex editable per year */}
        <div className="mt-4 pt-4 border-t border-ash">
          <div className="flex items-center justify-between mb-2">
            <p className="text-xs font-condensed uppercase text-ink-60 tracking-wider">Capex por año ($K USD) — editá según tu plan de inversión</p>
            <span className="text-[10px] font-condensed text-ink-30">
              (Sh!) es asset-light: sin fábrica propia → default $0. Agregá capex si planificás activos fijos.
            </span>
          </div>
          <div className="grid grid-cols-5 gap-2">
            {FORECAST_YEARS.map((y, i) => (
              <div key={y} className="text-center">
                <p className="text-[10px] font-condensed text-ink-40 mb-1">{y}</p>
                <input
                  type="number"
                  min={0}
                  step={100}
                  value={state.capex[i] || 0}
                  onChange={e => {
                    const newCapex = [...state.capex];
                    newCapex[i] = Math.max(0, parseFloat(e.target.value) || 0);
                    setState(s => ({ ...s, capex: newCapex }));
                  }}
                  className="w-full text-center text-xs font-condensed border border-ash bg-white px-1 py-1 text-ink focus:outline-none focus:border-gold"
                  style={{ borderRadius: 0 }}
                />
                <p className="text-[10px] font-condensed text-ink-20 mt-0.5">
                  {state.capex[i] >= 1000 ? `$${(state.capex[i]/1000).toFixed(1)}M` : state.capex[i] > 0 ? `$${state.capex[i]}K` : '—'}
                </p>
              </div>
            ))}
          </div>
        </div>

        <div className="mt-3 pt-3 border-t border-ash text-xs font-condensed text-ink-40 space-y-1">
          <p>🔴 <strong className="text-ink-60">ΔCapital de trabajo</strong> = la plata que inmovilizás cada año en inventario y crédito a clientes por crecer. A más revenue, más grande el pozo antes de que el negocio sea autosuficiente.</p>
          <p>💡 Bajá DSO (cobrar antes) o subí DPO (pagar después) para reducir la necesidad sin levantar equity ni deuda. Tocá los sliders abajo.</p>
        </div>
      </div>

      {/* The three levers */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-4 tracking-wider">Las 3 palancas de caja — tocá y ves el impacto instantáneo</p>
        <div className="grid grid-cols-3 gap-6">
          <div>
            <div className="text-center mb-3">
              <p className="text-xs font-condensed text-ink-60 uppercase">DSO — Días a Cobrar</p>
              <p className={`text-5xl font-condensed font-black ${state.daysAR > 45 ? 'text-red-600' : state.daysAR > 30 ? 'text-gold' : 'text-emerald-700'}`}>{state.daysAR}d</p>
              <p className="text-xs text-ink-60 font-condensed">Cuentas a cobrar</p>
            </div>
            <input type="range" min={7} max={120} step={1} value={state.daysAR}
              onChange={e => setState(s => ({ ...s, daysAR: parseInt(e.target.value) }))}
              className="w-full" />
            <div className="flex justify-between text-xs text-ink-20 font-condensed mt-1">
              <span>7d (contado)</span><span>120d (crédito extendido)</span>
            </div>
          </div>
          <div>
            <div className="text-center mb-3">
              <p className="text-xs font-condensed text-ink-60 uppercase">DIO — Días de Inventario</p>
              <p className={`text-5xl font-condensed font-black ${state.daysInventory > 30 ? 'text-red-600' : state.daysInventory > 15 ? 'text-gold' : 'text-emerald-700'}`}>{state.daysInventory}d</p>
              <p className="text-xs text-ink-60 font-condensed">Stock en depósito</p>
            </div>
            <input type="range" min={5} max={90} step={1} value={state.daysInventory}
              onChange={e => setState(s => ({ ...s, daysInventory: parseInt(e.target.value) }))}
              className="w-full" />
            <div className="flex justify-between text-xs text-ink-20 font-condensed mt-1">
              <span>5d (just-in-time)</span><span>90d (buffer alto)</span>
            </div>
          </div>
          <div>
            <div className="text-center mb-3">
              <p className="text-xs font-condensed text-ink-60 uppercase">DPO — Días a Pagar</p>
              <p className={`text-5xl font-condensed font-black ${state.daysAP < 20 ? 'text-red-600' : state.daysAP < 45 ? 'text-gold' : 'text-emerald-700'}`}>{state.daysAP}d</p>
              <p className="text-xs text-ink-60 font-condensed">Crédito de proveedor</p>
            </div>
            <input type="range" min={0} max={120} step={1} value={state.daysAP}
              onChange={e => setState(s => ({ ...s, daysAP: parseInt(e.target.value) }))}
              className="w-full" />
            <div className="flex justify-between text-xs text-ink-20 font-condensed mt-1">
              <span>0d (pago anticipado)</span><span>120d (crédito máximo)</span>
            </div>
          </div>
        </div>
      </div>

      {/* Cumulative cash position */}
      <div className="border border-ash bg-ink-5 p-4">
        <div className="mb-3">
          <p className="text-xs font-condensed uppercase text-gold tracking-wider">Posición de caja acumulada</p>
          <div className="flex gap-5 mt-1.5 text-xs font-condensed text-ink-60">
            <span className="flex items-center gap-1.5">
              <span className="inline-block w-3 h-3 align-middle" style={{ background: GREEN, opacity: 0.85 }}></span>
              <span className="inline-block w-3 h-3 align-middle" style={{ background: RED, opacity: 0.85 }}></span>
              <strong className="text-ink">Barras — FCF Anual:</strong> verde = generás caja, rojo = quemás caja ese año.
            </span>
            <span><span className="inline-block w-3 h-1.5 mr-1.5 align-middle" style={{ background: GOLD }}></span><strong className="text-ink">Línea — Caja Acumulada:</strong> tu posición total desde el arranque. Si cae debajo de $0, ese es el dinero que necesitás levantar.</span>
          </div>
          <p className="text-xs font-condensed text-ink-40 mt-1">
            Capital necesario = punto más bajo de la línea naranja × 1.2 (buffer). Hoy: <strong className="text-red-600">{fmt(peakNeed * 1000)}</strong> en {needYear} → con buffer: <strong className="text-red-600">{fmt(capitalGap * 1000)}</strong>
          </p>
        </div>
        <ResponsiveContainer width="100%" height={220}>
          <ComposedChart data={cashData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => v >= 1000 || v <= -1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Inter, Helvetica Neue, sans-serif', color: MUTED }} />
            <ReferenceLine y={0} stroke={RED} strokeDasharray="4 2" strokeWidth={1.5} />
            <Bar dataKey="FCF Anual" fill={RED} isAnimationActive={false}>
              {cashData.map((entry, index) => (
                <Cell key={`fcf-bar-${index}`} fill={entry['FCF Anual'] >= 0 ? GREEN : RED} fillOpacity={0.85} />
              ))}
            </Bar>
            <Line dataKey="Caja Acumulada" stroke={GOLD} strokeWidth={2.5} dot={{ fill: GOLD, r: 4 }} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>

      {/* Working capital breakdown */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Capital de trabajo — Cuentas a cobrar / Inventario / Cuentas a pagar</p>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={wcData}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => v >= 1000 || v <= -1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Inter, Helvetica Neue, sans-serif', color: MUTED }} />
            <ReferenceLine y={0} stroke="rgba(29,29,27,0.2)" />
            <Bar dataKey="Cuentas a Cobrar" stackId="wc" fill={BLUE} />
            <Bar dataKey="Inventario" stackId="wc" fill={PURPLE} />
            <Bar dataKey="Cuentas a Pagar" stackId="wc" fill={GREEN} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Sensitivity: DSO vs DPO impact on cash */}
      <div className="grid grid-cols-2 gap-4">
        <div className="border border-ash bg-ink-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Sensibilidad: días a cobrar (DSO) → caja 2030</p>
          <table className="w-full text-xs font-condensed">
            <thead><tr>
              <th className="text-left text-ink-40 pb-2">DSO</th>
              <th className="text-right text-ink-40 pb-2">Caja 2030</th>
              <th className="text-right text-ink-40 pb-2">vs actual</th>
            </tr></thead>
            <tbody>
              {sensitDSO.map(row => {
                const base = sensitDSO.find(r => r.dso === 45)?.peakCash || 0;
                const delta = row.peakCash - base;
                return (
                  <tr key={row.dso} className={row.dso === state.daysAR ? 'bg-gold-dim' : ''}>
                    <td className={`py-1 ${row.dso === state.daysAR ? 'text-gold font-bold' : 'text-ink-60'}`}>{row.dso}d</td>
                    <td className={`text-right ${row.peakCash >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>{fmt(row.peakCash * 1000)}</td>
                    <td className={`text-right ${delta >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>{delta >= 0 ? '+' : ''}{fmt(delta * 1000)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="border border-ash bg-ink-5 p-4">
          <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Sensibilidad: días a pagar (DPO) → caja 2030</p>
          <table className="w-full text-xs font-condensed">
            <thead><tr>
              <th className="text-left text-ink-40 pb-2">DPO</th>
              <th className="text-right text-ink-40 pb-2">Caja 2030</th>
              <th className="text-right text-ink-40 pb-2">vs actual</th>
            </tr></thead>
            <tbody>
              {sensitDPO.map(row => {
                const base = sensitDPO.find(r => r.dpo === 30)?.peakCash || 0;
                const delta = row.peakCash - base;
                return (
                  <tr key={row.dpo} className={row.dpo === state.daysAP ? 'bg-gold-dim' : ''}>
                    <td className={`py-1 ${row.dpo === state.daysAP ? 'text-gold font-bold' : 'text-ink-60'}`}>{row.dpo}d</td>
                    <td className={`text-right ${row.peakCash >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>{fmt(row.peakCash * 1000)}</td>
                    <td className={`text-right ${delta >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>{delta >= 0 ? '+' : ''}{fmt(delta * 1000)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE P&L — Consolidado por país + líneas de gasto editables
// ─────────────────────────────────────────────
function ModulePL({ state, setState }) {
  const fin = useMemo(() => buildFinancials(state), [state]);
  const mult = state.scenarioMultipliers[state.scenario];

  // Revenue per country per year (+ EBITDA merged for chart)
  const revenueByCountry = useMemo(() => {
    return YEARS.map(y => {
      const yearIdx = y - 2025;
      const row = { year: y, total: 0 };
      for (const mkt of Object.values(state.markets)) {
        const rev = mkt.active && y >= mkt.openYear
          ? (calcMarketVolume(mkt, yearIdx, mult) / 1000) * mkt.priceUSD : 0;
        row[mkt.country] = Math.round(rev);
        row.total += rev;
      }
      row.total = Math.round(row.total);
      row['EBITDA'] = Math.round(fin[y]?.ebitda || 0);
      return row;
    });
  }, [state, fin]);

  const setExpLine = (id, field, val) => setState(s => ({
    ...s,
    expenseLines: s.expenseLines.map(l => l.id === id ? { ...l, [field]: val } : l)
  }));

  const addExpLine = () => setState(s => ({
    ...s,
    expenseLines: [...s.expenseLines, {
      id: `line_${Date.now()}`, label: 'Nueva línea', pct: 0.02, color: '#94a3b8'
    }]
  }));

  const removeExpLine = (id) => setState(s => ({
    ...s, expenseLines: s.expenseLines.filter(l => l.id !== id)
  }));

  const totalOpExPct = calcOpExPct(state);
  const activeMarkets = Object.values(state.markets).filter(m => m.active);


  return (
    <div className="p-4 space-y-5">

      {/* KPI header */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[2027, 2028, 2029, 2030].map(y => {
          const rev = fin[y]?.revenue || 0;
          const gp = fin[y]?.grossProfit || 0;
          const ebitda = fin[y]?.ebitda || 0;
          const gpPct = rev > 0 ? gp / rev : 0;
          const ebitdaPct = rev > 0 ? ebitda / rev : 0;
          return (
            <div key={y} className="border border-ash bg-ink-5 p-3">
              <p className="text-xs font-condensed text-ink-40 uppercase mb-1">{y}</p>
              <p className="text-2xl font-condensed font-black text-ink">{fmt(rev * 1000)}</p>
              <p className="text-xs font-condensed mt-1">
                <span className="text-emerald-700">GP {(gpPct*100).toFixed(0)}%</span>
                <span className="text-ink-40 mx-1">·</span>
                <span className={ebitda >= 0 ? 'text-gold' : 'text-red-600'}>EBITDA {(ebitdaPct*100).toFixed(0)}%</span>
              </p>
            </div>
          );
        })}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">

        {/* LEFT: expense lines editor */}
        <div className="lg:col-span-2 space-y-3">
          <div className="border border-ash bg-ink-5 p-4">
            <div className="flex justify-between items-center mb-3">
              <p className="text-xs font-condensed uppercase text-gold tracking-wider">Estructura de costos</p>
              <span className="text-xs font-condensed text-ink-40">% de revenue neto</span>
            </div>

            {/* COGS — derived, not editable here */}
            <div className="mb-3 pb-3 border-b border-ash">
              {activeMarkets.map(mkt => {
                const gpPct = mkt.priceUSD > 0 ? ((mkt.priceUSD - mkt.cogsUSD) / mkt.priceUSD * 100) : 0;
                return (
                  <div key={mkt.code} className="flex justify-between items-center py-0.5">
                    <span className="text-xs font-condensed text-ink-60">{mkt.flag} COGS {mkt.country}</span>
                    <span className="text-xs font-condensed text-red-600 font-bold">
                      {(mkt.cogsUSD / mkt.priceUSD * 100).toFixed(0)}% · GP {gpPct.toFixed(0)}%
                    </span>
                  </div>
                );
              })}
            </div>

            {/* Editable OpEx lines */}
            <p className="text-xs font-condensed text-ink-40 uppercase tracking-wider mb-2">Gastos operativos (OpEx)</p>
            {state.expenseLines.map(line => (
              <div key={line.id} className="mb-2">
                <div className="flex items-center gap-2 mb-1">
                  <div className="w-2 h-2 flex-shrink-0" style={{ background: line.color }} />
                  <input
                    type="text" value={line.label}
                    onChange={e => setExpLine(line.id, 'label', e.target.value)}
                    className="bg-transparent text-xs font-condensed text-ink-60 flex-1 min-w-0 border-b border-transparent hover:border-ink-20 focus:border-gold outline-none"
                  />
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <input
                      type="number" value={(line.pct * 100).toFixed(1)}
                      min={0} max={100} step={0.5}
                      onChange={e => setExpLine(line.id, 'pct', (parseFloat(e.target.value) || 0) / 100)}
                      className="bg-white border border-ash text-right px-1 py-0.5 font-condensed font-bold text-sm w-14"
                      style={{ color: line.color }}
                    />
                    <span className="text-ink-40 text-xs font-condensed">%</span>
                    <button onClick={() => removeExpLine(line.id)}
                      className="text-ink-20 hover:text-red-600 text-xs ml-1">×</button>
                  </div>
                </div>
                <input type="range" min={0} max={40} step={0.5}
                  value={(line.pct * 100).toFixed(1)}
                  onChange={e => setExpLine(line.id, 'pct', (parseFloat(e.target.value) || 0) / 100)}
                  className="w-full" />
              </div>
            ))}

            <button onClick={addExpLine}
              className="mt-2 text-xs font-condensed text-ink-40 hover:text-gold border border-dashed border-ink-20 hover:border-gold px-3 py-1 w-full">
              + Agregar línea
            </button>

            {/* Totals */}
            <div className="mt-3 pt-3 border-t border-ash space-y-1">
              <div className="flex justify-between text-xs font-condensed">
                <span className="text-ink-40 uppercase">Total OpEx</span>
                <span className="text-ink font-bold">{(totalOpExPct * 100).toFixed(1)}%</span>
              </div>
              {activeMarkets.map(mkt => {
                const blendedCogs = mkt.priceUSD > 0 ? mkt.cogsUSD / mkt.priceUSD : 0;
                const ebitdaPct = 1 - blendedCogs - totalOpExPct;
                return (
                  <div key={mkt.code} className="flex justify-between text-xs font-condensed">
                    <span className="text-ink-40">{mkt.flag} EBITDA {mkt.country}</span>
                    <span className={ebitdaPct >= 0 ? 'text-gold font-bold' : 'text-red-600 font-bold'}>
                      {(ebitdaPct * 100).toFixed(1)}%
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* RIGHT: P&L table by year */}
        <div className="lg:col-span-3 overflow-x-auto">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xs font-condensed uppercase tracking-wider text-ink-40">P&L Consolidado</span>
            <span className="inline-flex items-center gap-1 bg-gold/10 border border-gold/30 text-gold text-[10px] font-condensed px-2 py-0.5 rounded-sm">
              <span className="font-bold">2025A</span>
              <span className="text-ink-40">Real auditado</span>
            </span>
          </div>
          <table className="w-full text-xs font-condensed">
            <thead>
              <tr className="border-b border-ash">
                <th className="text-left text-ink-40 py-2 pr-3 font-normal uppercase tracking-wider w-40">Línea</th>
                {YEARS.map(y => (
                  <th key={y} className={`text-right py-2 px-2 font-normal ${y === 2025 ? 'text-gold font-bold' : 'text-ink-40'}`}>{y === 2025 ? '2025A' : y}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {/* Revenue by country */}
              {activeMarkets.map(mkt => (
                <tr key={mkt.code} className="border-b border-ash">
                  <td className="py-1 pr-3 text-ink-40">{mkt.flag} Rev {mkt.country}</td>
                  {YEARS.map(y => (
                    <td key={y} className="text-right px-2 py-1" style={{ color: mkt.color }}>
                      {revenueByCountry.find(r => r.year === y)?.[mkt.country] > 0
                        ? fmt(revenueByCountry.find(r => r.year === y)?.[mkt.country] * 1000)
                        : '—'}
                    </td>
                  ))}
                </tr>
              ))}

              {/* Total Revenue */}
              <tr className="border-b border-ink-20 bg-ink-5">
                <td className="py-1.5 pr-3 font-bold text-ink uppercase">Revenue Total</td>
                {YEARS.map(y => (
                  <td key={y} className="text-right px-2 py-1.5 font-bold text-ink">{fmt((fin[y]?.revenue||0)*1000)}</td>
                ))}
              </tr>

              {/* COGS */}
              <tr className="border-b border-ash">
                <td className="py-1 pr-3 text-ink-60">COGS</td>
                {YEARS.map(y => (
                  <td key={y} className="text-right px-2 py-1 text-ink-60">({fmt((fin[y]?.cogs||0)*1000)})</td>
                ))}
              </tr>

              {/* Gross Profit */}
              <tr className="border-b border-ink-20 bg-ink-5">
                <td className="py-1.5 pr-3 font-bold text-ink">Margen Bruto</td>
                {YEARS.map(y => {
                  const rev = fin[y]?.revenue || 0;
                  const gp = fin[y]?.grossProfit || 0;
                  const pct = rev > 0 ? (gp/rev*100).toFixed(0) : 0;
                  return (
                    <td key={y} className={`text-right px-2 py-1.5 font-bold ${gp >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                      {fmt(gp*1000)}
                      <span className="text-ink-40 font-normal ml-1 text-xs">{pct}%</span>
                    </td>
                  );
                })}
              </tr>

              {/* OpEx — lump sum (2025A real, 2026+ total proyectado) */}
              <tr className="border-b border-ash">
                <td className="py-1 pr-3 text-ink-60 font-medium">OpEx</td>
                {YEARS.map(y => (
                  <td key={y} className="text-right px-2 py-1 text-ink-60">
                    ({fmt((y === 2025 ? ACTUALS_2025.sga : fin[y]?.sga || 0) * 1000)})
                  </td>
                ))}
              </tr>


              {/* OpEx breakdown — 2025 muestra "—" (globo real), 2026+ por línea */}
              {state.expenseLines.map(line => (
                <tr key={line.id} className="border-b border-ash">
                  <td className="py-1 pr-3 pl-3 flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 inline-block flex-shrink-0 rounded-sm" style={{ background: line.color }} />
                    <span className="text-ink-40">{line.label}</span>
                    <span className="text-ink-20 text-[10px]">({(line.pct*100).toFixed(1)}%)</span>
                  </td>
                  {YEARS.map(y => (
                    <td key={y} className="text-right px-2 py-1 text-ink-30">
                      {y === 2025
                        ? <span className="text-ink-20">—</span>
                        : `(${fmt((fin[y]?.revenue||0) * line.pct * 1000)})`}
                    </td>
                  ))}
                </tr>
              ))}

              {/* EBITDA */}
              <tr className="border-b border-ink-20 bg-ink-5">
                <td className="py-1.5 pr-3 font-bold text-ink">EBITDA</td>
                {YEARS.map(y => {
                  const rev = fin[y]?.revenue || 0;
                  const ebitda = fin[y]?.ebitda || 0;
                  const pct = rev > 0 ? (ebitda/rev*100).toFixed(0) : 0;
                  return (
                    <td key={y} className={`text-right px-2 py-1.5 font-bold ${ebitda >= 0 ? 'text-gold' : 'text-red-600'}`}>
                      {ebitda < 0 ? `(${fmt(Math.abs(ebitda)*1000)})` : fmt(ebitda*1000)}
                      <span className="text-ink-40 font-normal ml-1 text-xs">{pct}%</span>
                    </td>
                  );
                })}
              </tr>

              {/* D&A */}
              <tr className="border-b border-ash">
                <td className="py-1 pr-3 text-ink-40">D&A</td>
                {YEARS.map(y => (
                  <td key={y} className="text-right px-2 py-1 text-ink-40">
                    {y > 2025 && (fin[y]?.depreciation||0) > 0 ? `(${fmt((fin[y].depreciation)*1000)})` : '—'}
                  </td>
                ))}
              </tr>

              {/* EBIT */}
              <tr className="border-b border-ash">
                <td className="py-1 pr-3 text-ink-60">EBIT</td>
                {YEARS.map(y => {
                  const ebit = fin[y]?.ebit || 0;
                  return (
                    <td key={y} className={`text-right px-2 py-1 ${ebit >= 0 ? 'text-ink-60' : 'text-red-600'}`}>
                      {ebit < 0 ? `(${fmt(Math.abs(ebit)*1000)})` : fmt(ebit*1000)}
                    </td>
                  );
                })}
              </tr>

              {/* Tax */}
              <tr className="border-b border-ash">
                <td className="py-1 pr-3 text-ink-40">Impuestos ({(state.taxRate*100).toFixed(0)}%)</td>
                {YEARS.map(y => (
                  <td key={y} className="text-right px-2 py-1 text-ink-40">
                    {(fin[y]?.tax||0) > 0 ? `(${fmt(fin[y].tax*1000)})` : '—'}
                  </td>
                ))}
              </tr>

              {/* Net Income */}
              <tr className="bg-ink-5">
                <td className="py-2 pr-3 font-bold text-ink uppercase">Net Income</td>
                {YEARS.map(y => {
                  const ni = (fin[y]?.ebit || 0) - (fin[y]?.tax || 0);
                  const rev = fin[y]?.revenue || 0;
                  const pct = rev > 0 ? (ni/rev*100).toFixed(0) : 0;
                  return (
                    <td key={y} className={`text-right px-2 py-2 font-bold ${ni >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                      {ni < 0 ? `(${fmt(Math.abs(ni)*1000)})` : fmt(ni*1000)}
                      <span className="text-ink-40 font-normal ml-1 text-xs">{pct}%</span>
                    </td>
                  );
                })}
              </tr>

            </tbody>
          </table>
        </div>
      </div>

      {/* Revenue stacked + EBITDA line chart */}
      <div className="border border-ash bg-ink-5 p-4">
        <p className="text-xs font-condensed uppercase text-gold mb-3 tracking-wider">Revenue por país + EBITDA ($K USD)</p>
        <ResponsiveContainer width="100%" height={240}>
          <ComposedChart data={revenueByCountry}>
            <CartesianGrid strokeDasharray="2 2" stroke="rgba(29,29,27,0.08)" />
            <XAxis dataKey="year" tick={{ fill: MUTED, fontSize: 11, fontFamily: 'Barlow Condensed' }} axisLine={false} tickLine={false} />
            <YAxis yAxisId="rev" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false}
              tickFormatter={v => v >= 1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <YAxis yAxisId="ebitda" orientation="right" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false}
              tickFormatter={v => v >= 1000 ? `$${(v/1000).toFixed(0)}M` : `$${v}K`} />
            <Tooltip content={<CustomTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'Inter, Helvetica Neue, sans-serif', color: MUTED }} />
            {activeMarkets.map(mkt => (
              <Bar key={mkt.code} yAxisId="rev" dataKey={mkt.country} stackId="rev" fill={mkt.color} fillOpacity={0.8} />
            ))}
            <Line yAxisId="ebitda" dataKey="EBITDA" stroke={GOLD} strokeWidth={2.5}
              dot={{ fill: GOLD, r: 4 }} name="EBITDA" />
          </ComposedChart>
        </ResponsiveContainer>
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
const TABS = [
  { id: 'markets',   label: '01 — Producto & Mercado', question: '¿Qué vendo, a quién y a qué precio?' },
  { id: 'pl',        label: '02 — P&L',                question: '¿Cuál es mi estructura de costos y rentabilidad?' },
  { id: 'caja',      label: '03 — Caja',               question: '¿Me alcanza la plata? ¿Cuánto capital necesito?' },
  { id: 'financing', label: '04 — Financiamiento',     question: '¿Deuda o equity — y qué me cuesta?' },
  { id: 'dcf',       label: '05 — Valuación',          question: '¿Cuánto vale (Sh!) hoy?' },
  { id: 'channels',  label: 'Canales',                  question: '¿Dónde meto el próximo peso?',        appendix: true },
  { id: 'macro',     label: 'Macro',                    question: '¿Cómo me afecta la macro?',           appendix: true },
];

function App() {
  const [state, setState] = useState(INITIAL_STATE);
  const [activeTab, setActiveTab] = useState('markets');
  const [showAppendix, setShowAppendix] = useState(false);

  const activeTabData = TABS.find(t => t.id === activeTab);

  return (
    <div className="min-h-screen bg-white text-ink" style={{ fontFamily: 'Inter, Helvetica Neue, sans-serif' }}>
      {/* Header */}
      <div className="border-b border-ash px-5 py-3 flex items-center justify-between bg-white" style={{ borderBottomWidth: '1px' }}>
        <div className="flex items-center gap-4">
          <span className="text-xl font-black tracking-tight" style={{ fontFamily: 'Inter, Helvetica Neue, sans-serif', letterSpacing: '-0.02em' }}>
            <span style={{ color: '#1D1D1B' }}>(</span><span style={{ color: '#F7AF1C' }}>Sh!</span><span style={{ color: '#1D1D1B' }}>)</span>
          </span>
          <div className="w-px h-5 bg-ash" />
          <span className="text-xs font-semibold text-ink-40 uppercase tracking-widest">Strategic Decision Tool</span>
        </div>
        <span className="text-xs font-medium text-ink-20 uppercase tracking-widest hidden md:block">Confidencial · No distribuir</span>
      </div>

      {/* Global Controls */}
      <GlobalControls state={state} setState={setState} />

      {/* Tabs */}
      <div className="flex border-b border-ash overflow-x-auto items-stretch">
        {TABS.filter(t => !t.appendix).map(tab => (
          <button key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            className={`px-4 py-3 text-xs font-condensed font-bold uppercase tracking-wider whitespace-nowrap ${activeTab === tab.id ? 'tab-active' : 'text-ink-60 hover:text-ink'}`}>
            {tab.label}
          </button>
        ))}
        <div className="w-px bg-ash mx-1 self-stretch" />
        <button
          onClick={() => setShowAppendix(s => !s)}
          className={`px-3 py-3 text-xs font-condensed uppercase tracking-wider whitespace-nowrap text-ink-30 hover:text-ink-60 flex items-center gap-1`}>
          Apéndice {showAppendix ? '▲' : '▼'}
        </button>
        {showAppendix && TABS.filter(t => t.appendix).map(tab => (
          <button key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            className={`px-4 py-3 text-xs font-condensed font-bold uppercase tracking-wider whitespace-nowrap ${activeTab === tab.id ? 'tab-active' : 'text-ink-40 hover:text-ink'}`}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Active question */}
      <div className="px-4 py-2 bg-ink-5 border-b border-ash">
        <p className="text-xs font-condensed text-ink-60 uppercase tracking-wider">
          Pregunta: <span className="text-ink">{activeTabData?.question}</span>
        </p>
      </div>

      {/* Module content */}
      <div className="overflow-y-auto" style={{ maxHeight: 'calc(100vh - 130px)' }}>
        {activeTab === 'markets'   && <Module1 state={state} setState={setState} />}
        {activeTab === 'pl'        && <ModulePL state={state} setState={setState} />}
        {activeTab === 'caja'      && <Module6 state={state} setState={setState} />}
        {activeTab === 'financing' && <Module2 state={state} setState={setState} />}
        {activeTab === 'channels'  && <Module3 state={state} setState={setState} />}
        {activeTab === 'macro'     && <Module4 state={state} setState={setState} />}
        {activeTab === 'dcf'       && <Module5 state={state} setState={setState} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
